<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schmoo's Escape!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0717; --mist:#cfd9ff; --cyan:#46e6ff; --violet:#8b6cff;
    --rose:#ff5d8f; --good:#54e08a; --warn:#ffd166;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden; background:#06040f; font-family:'Quicksand',system-ui,sans-serif;}
  #game{position:fixed; inset:0; overflow:hidden;}
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;}

  /* ---- HUD ---- */
  #hud{position:absolute; inset:0; pointer-events:none; padding:clamp(12px,2.4vmin,26px);
       display:flex; flex-direction:column; gap:10px;}
  #topbar{display:flex; align-items:flex-start; justify-content:space-between; gap:16px;}
  #score{font-family:'Orbitron',sans-serif; font-weight:900; color:#fff;
         font-size:clamp(28px,6vmin,56px); line-height:1; letter-spacing:1px;
         text-shadow:0 0 18px rgba(70,230,255,.55), 0 2px 0 rgba(0,0,0,.35);}
  #score small{display:block; font-family:'Quicksand'; font-weight:600; letter-spacing:3px;
         font-size:clamp(9px,1.5vmin,12px); color:var(--mist); opacity:.7; text-shadow:none; margin-top:4px;}
  #timer{font-family:'Orbitron',sans-serif; font-weight:900; color:#bfe9ff; margin-top:10px;
         font-size:clamp(20px,4vmin,38px); line-height:1; letter-spacing:1px;
         text-shadow:0 0 16px rgba(70,230,255,.5), 0 2px 0 rgba(0,0,0,.35);}
  #timer.urgent{color:#ffd24a; text-shadow:0 0 18px rgba(255,210,74,.7), 0 2px 0 rgba(0,0,0,.35);}
  #timer small{display:block; font-family:'Quicksand'; font-weight:600; letter-spacing:3px;
         font-size:clamp(9px,1.5vmin,12px); color:var(--mist); opacity:.7; text-shadow:none; margin-top:4px;}
  #danger{width:min(38vw,320px);}
  #danger .lab{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  #danger .lab b{font-family:'Orbitron'; font-weight:700; font-size:clamp(10px,1.7vmin,13px);
         letter-spacing:2px; color:var(--mist);}
  #danger .lab span{font-size:clamp(9px,1.5vmin,12px); color:var(--mist); opacity:.65; font-weight:600;}
  #track{height:clamp(9px,1.5vmin,13px); border-radius:999px; overflow:hidden;
         background:rgba(255,255,255,.10); box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);}
  #fill{height:100%; width:60%; border-radius:999px;
        background:linear-gradient(90deg,#ff4d6d,#ffd166,#54e08a);
        transition:width .12s linear, filter .2s;}

  /* ---- Credits chip ---- */
  #creds{display:inline-flex; align-items:center; gap:8px; margin-top:12px;
         padding:6px 12px 6px 8px; border-radius:999px; pointer-events:none;
         background:linear-gradient(135deg, rgba(255,209,90,.18), rgba(239,155,28,.16));
         box-shadow:inset 0 0 0 1px rgba(255,255,255,.16), 0 4px 14px rgba(0,0,0,.25);}
  #creds svg{width:clamp(16px,2.8vmin,22px); height:clamp(16px,2.8vmin,22px);
         filter:drop-shadow(0 0 6px rgba(255,200,80,.7));}
  #creds .cnum{font-family:'Orbitron',sans-serif; font-weight:900; color:#fff;
         font-size:clamp(15px,2.6vmin,22px); line-height:1; letter-spacing:.5px;
         text-shadow:0 0 12px rgba(255,209,90,.55);}
  #creds .cmul{font-family:'Orbitron',sans-serif; font-weight:700;
         font-size:clamp(11px,1.9vmin,15px); letter-spacing:.5px; color:#ffd35a;
         opacity:0; transform:scale(.6); transition:opacity .15s, transform .15s;
         text-shadow:0 0 10px rgba(255,209,90,.7);}
  #creds.show-mul .cmul{opacity:1; transform:scale(1);}
  #creds.bump{animation:credBump .32s ease-out;}
  @keyframes credBump{ 0%{transform:scale(1);} 35%{transform:scale(1.14);} 100%{transform:scale(1);} }
  .scoreline .n.gold{color:#ffd35a; text-shadow:0 0 22px rgba(255,209,90,.55);}

  /* ---- Overlay ---- */
  #overlay{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
           text-align:center; padding:24px; z-index:5;
           background:radial-gradient(120% 90% at 50% 30%, rgba(20,12,46,.30), rgba(6,4,15,.74));
           backdrop-filter:blur(2px); transition:opacity .4s; }
  #overlay.hide{opacity:0; pointer-events:none;}
  .panel{max-width:560px; display:flex; flex-direction:column; align-items:center; gap:18px;}
  .kicker{font-family:'Quicksand'; font-weight:600; letter-spacing:6px; text-transform:uppercase;
          font-size:clamp(10px,1.8vmin,13px); color:var(--cyan); opacity:.85;}
  h1{font-family:'Orbitron',sans-serif; font-weight:900; color:#fff; line-height:.95;
     font-size:clamp(44px,12vmin,104px); letter-spacing:2px;
     text-shadow:0 0 36px rgba(139,108,255,.65), 0 0 12px rgba(70,230,255,.55);}
  h1 .small{display:block; font-size:.42em; letter-spacing:8px; color:var(--violet); margin-top:6px;}
  .blurb{font-size:clamp(14px,2.3vmin,18px); color:var(--mist); opacity:.82; font-weight:500; max-width:34ch; line-height:1.5;}
  .cta{pointer-events:auto; cursor:pointer; border:none; color:#0a0717; font-family:'Orbitron'; font-weight:700;
       letter-spacing:2px; font-size:clamp(14px,2.2vmin,17px); padding:14px 30px; border-radius:999px;
       background:linear-gradient(135deg,#7af0ff,#9b8bff); box-shadow:0 10px 30px rgba(120,120,255,.4), 0 0 0 1px rgba(255,255,255,.25) inset;
       transition:transform .12s, box-shadow .2s;}
  .cta:hover{transform:translateY(-2px); box-shadow:0 14px 38px rgba(120,120,255,.55), 0 0 0 1px rgba(255,255,255,.4) inset;}
  .cta:active{transform:translateY(0);}
  .keys{display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:2px;}
  .key{display:flex; align-items:center; gap:8px; color:var(--mist); opacity:.8; font-size:clamp(12px,1.9vmin,14px); font-weight:600;}
  .cap{font-family:'Orbitron'; font-weight:700; font-size:.8em; padding:5px 9px; border-radius:8px;
       background:rgba(255,255,255,.08); box-shadow:inset 0 0 0 1px rgba(255,255,255,.16); color:#fff; letter-spacing:1px;}
  .scoreline{display:flex; gap:34px; justify-content:center;}
  .scoreline div{display:flex; flex-direction:column; gap:4px;}
  .scoreline .n{font-family:'Orbitron'; font-weight:900; font-size:clamp(34px,7vmin,60px); color:#fff;
       text-shadow:0 0 22px rgba(70,230,255,.5);}
  .scoreline .l{font-size:clamp(10px,1.6vmin,12px); letter-spacing:3px; text-transform:uppercase; color:var(--mist); opacity:.65; font-weight:600;}
  .tiny{font-size:clamp(11px,1.7vmin,13px); color:var(--mist); opacity:.55; font-weight:500; letter-spacing:.5px;}
  /* ---- Photosensitivity warning gate (shown once at launch) ---- */
  .warnmark{width:clamp(52px,10vmin,82px); height:clamp(52px,10vmin,82px);
       filter:drop-shadow(0 0 20px rgba(255,209,102,.5));}
  .warnmark svg{width:100%; height:100%; display:block;}
  #overlay .panel.warn .blurb{max-width:46ch; opacity:.9;}
  #overlay .panel.warn .blurb + .blurb{margin-top:-6px;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }

  /* ---- Level 2 (B&W) HUD theming: dark ink on the white Dino background ---- */
  body.lvl2 #score{color:#2b2b2b; text-shadow:0 1px 0 rgba(255,255,255,.6);}
  body.lvl2 #score small{color:#8a8a8a;}
  body.lvl2 #timer{color:#2b2b2b; text-shadow:none;}
  body.lvl2 #timer.urgent{color:#000; text-shadow:none;}
  body.lvl2 #timer small{color:#8a8a8a;}
  body.lvl2 #danger .lab b{color:#555;}
  body.lvl2 #danger .lab span{color:#8a8a8a;}
  body.lvl2 #track{background:rgba(0,0,0,.10); box-shadow:inset 0 0 0 1px rgba(0,0,0,.18);}
  body.lvl2 #creds{background:linear-gradient(135deg, rgba(0,0,0,.07), rgba(0,0,0,.04)); box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);}
  body.lvl2 #creds .cnum{color:#2b2b2b; text-shadow:none;}
  body.lvl2 #creds .cmul{color:#555; text-shadow:none;}
  body.lvl2 #creds svg{filter:none;}

  /* ---- Level 2 start screen: "servers offline" status card (readable on the white bg) ---- */
  body.lvl2 #overlay{ background:radial-gradient(120% 90% at 50% 30%, rgba(14,16,26,.5), rgba(8,9,16,.84)); }
  .statuscard{position:relative; overflow:hidden; max-width:560px; width:min(92vw,560px);
       padding:clamp(26px,4vmin,38px) clamp(22px,3.4vmin,34px) clamp(22px,3.2vmin,30px);
       border-radius:22px; background:rgba(249,250,252,.95);
       box-shadow:0 26px 64px rgba(8,9,16,.5), inset 0 0 0 1px rgba(0,0,0,.07);
       display:flex; flex-direction:column; align-items:center; gap:15px;}
  .statuscard::before{content:''; position:absolute; top:0; left:0; right:0; height:4px;
       background:linear-gradient(90deg,#ff4d6d,#ff7a59,#ffd166);}
  .statusline{display:flex; align-items:center; gap:9px; font-family:'Orbitron',sans-serif;
       font-weight:700; letter-spacing:2px; text-transform:uppercase;
       font-size:clamp(10px,1.7vmin,13px); color:#c2334f;}
  .statusline .dot{width:9px; height:9px; border-radius:50%; background:#ff3d5d;
       box-shadow:0 0 0 0 rgba(255,61,93,.55); animation:pulseDot 1.5s ease-out infinite;}
  @keyframes pulseDot{ 0%{box-shadow:0 0 0 0 rgba(255,61,93,.55);}
       70%{box-shadow:0 0 0 11px rgba(255,61,93,0);} 100%{box-shadow:0 0 0 0 rgba(255,61,93,0);} }
  .statuscard h1{color:#1b1c24; text-shadow:none; font-size:clamp(34px,8.5vmin,68px);}
  .statuscard h1 .small{color:#ff4d6d; text-shadow:none;}
  .statuscard .blurb{color:#4a4d57; opacity:1;}
  .statuscard .blurb b{color:#1b1c24;}
  .statuscard .key{color:#6a6d77; opacity:1;}
  .statuscard .cap{background:rgba(0,0,0,.06); box-shadow:inset 0 0 0 1px rgba(0,0,0,.16); color:#2b2b2b;}
  .statuscard .tiny{color:#9498a2; opacity:1;}

  /* ---- TEMP dev level-skip picker ---- */
  .devskip{margin-top:8px; display:flex; flex-direction:column; align-items:center; gap:7px;
       pointer-events:auto;}
  .devlab{font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:2.5px;
       font-size:9px; color:#8b8fa3;}
  .lvlrow{display:flex; gap:8px;}
  .lvlbtn{cursor:pointer; font-family:'Orbitron',sans-serif; font-weight:700; font-size:13px;
       min-width:38px; padding:7px 13px; border-radius:10px;
       border:1px solid rgba(140,140,155,.45); background:rgba(140,140,155,.12); color:#9aa0b4;
       transition:transform .1s, background .15s, color .15s, box-shadow .15s;}
  .lvlbtn:hover{transform:translateY(-1px);}
  .lvlbtn.on{background:linear-gradient(135deg,#7af0ff,#9b8bff); color:#0a0717; border-color:transparent;
       box-shadow:0 6px 16px rgba(120,120,255,.35);}
  .statuscard .devlab{color:#8a8d96;}
  .statuscard .lvlbtn{color:#5a5d67; border-color:rgba(0,0,0,.18); background:rgba(0,0,0,.04);}
  .statuscard .lvlbtn.on{color:#0a0717;}

  /* ---- Level 3 (cyberspace flight) — black/neon-green finale theming ---- */
  .cybercard{position:relative; overflow:hidden; max-width:560px; width:min(92vw,560px);
       padding:clamp(26px,4vmin,40px) clamp(22px,3.4vmin,34px) clamp(20px,3vmin,28px);
       border-radius:22px; background:rgba(4,10,8,.86);
       box-shadow:0 26px 70px rgba(0,0,0,.65), inset 0 0 0 1px rgba(60,255,140,.22),
                  inset 0 0 60px rgba(20,120,70,.12);
       display:flex; flex-direction:column; align-items:center; gap:14px;}
  .cybercard::before{content:''; position:absolute; top:0; left:0; right:0; height:3px;
       background:linear-gradient(90deg, rgba(70,255,140,0), #46ff8c, #7af0ff, rgba(70,255,140,0));}
  .statusline.cyber{color:#5dffa0;}
  .statusline .dot.grn{background:#46ff8c; box-shadow:0 0 0 0 rgba(70,255,140,.55); animation:pulseGrn 1.5s ease-out infinite;}
  @keyframes pulseGrn{ 0%{box-shadow:0 0 0 0 rgba(70,255,140,.55);} 70%{box-shadow:0 0 0 11px rgba(70,255,140,0);} 100%{box-shadow:0 0 0 0 rgba(70,255,140,0);} }
  .cyberttl{color:#eafff2; text-shadow:0 0 30px rgba(70,255,140,.55), 0 0 12px rgba(122,240,255,.4);
       font-size:clamp(38px,9.5vmin,82px);}
  .cyberttl .small{color:#46ff8c; -webkit-text-fill-color:#46ff8c; text-shadow:0 0 18px rgba(70,255,140,.6);}
  .cybercard .blurb{color:#cfeede; opacity:.92;}
  .cybercard .key{color:#9fcdb6; opacity:1;}
  .cybercard .cap{background:rgba(70,255,140,.10); box-shadow:inset 0 0 0 1px rgba(70,255,140,.32); color:#daffe9;}
  .tiny.grn{color:#7fcf9f; opacity:.85;}
  .cta.cyber{color:#022016; background:linear-gradient(135deg,#7dffb0,#46ff8c);
       box-shadow:0 10px 30px rgba(40,220,120,.4), 0 0 0 1px rgba(255,255,255,.25) inset;}
  .cta.cyber:hover{box-shadow:0 14px 38px rgba(40,220,120,.55), 0 0 0 1px rgba(255,255,255,.4) inset;}
  .cybercard .devlab{color:#6f9a82;}
  .cybercard .lvlbtn{color:#7fcf9f; border-color:rgba(70,255,140,.3); background:rgba(70,255,140,.06);}
  .cybercard .lvlbtn.on{background:linear-gradient(135deg,#7dffb0,#46ff8c); color:#022016; border-color:transparent;}

  /* ---- Reroll (extra-life) control: two arrows circling a purple square ---- */
  .rerollwrap{display:flex; flex-direction:column; align-items:center; gap:9px; pointer-events:auto;}
  .reroll{cursor:pointer; border:none; padding:0; background:none; display:flex; flex-direction:column;
       align-items:center; gap:8px; transition:transform .12s;}
  .reroll:hover{transform:translateY(-2px);}
  .reroll:active{transform:translateY(0);}
  .reroll .sq{width:clamp(58px,11vmin,76px); height:clamp(58px,11vmin,76px); border-radius:16px;
       background:linear-gradient(150deg,#8b5bff,#6a2ff0 60%,#4f1fc4);
       box-shadow:0 10px 26px rgba(110,60,255,.5), inset 0 0 0 1px rgba(255,255,255,.28),
                  0 0 22px rgba(139,108,255,.55);
       display:flex; align-items:center; justify-content:center;}
  .reroll .sq svg{width:62%; height:62%; display:block;
       filter:drop-shadow(0 1px 2px rgba(0,0,0,.35));}
  .reroll .rlab{font-family:'Orbitron',sans-serif; font-weight:800; letter-spacing:1.5px;
       font-size:clamp(11px,1.9vmin,14px); color:#e9ddff; text-shadow:0 0 12px rgba(139,108,255,.6);}
  .reroll .rlab b{color:#ffd35a;}
  .reroll.disabled{cursor:not-allowed; opacity:.4;}
  .reroll.disabled:hover{transform:none;}
  .deathrow{display:flex; gap:16px; align-items:flex-end; justify-content:center; flex-wrap:wrap;}
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>
  <audio id="bgm" preload="none" src="assets/bgm.mp3"></audio>
  <div id="hud">
    <div id="topbar">
      <div>
        <div id="score">0<small>SCORE</small></div>
        <div id="creds">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <defs>
              <linearGradient id="credGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#fff1b8"/>
                <stop offset="0.45" stop-color="#ffd24a"/>
                <stop offset="1" stop-color="#ef9b1c"/>
              </linearGradient>
            </defs>
            <path d="M12 1 C12.7 6.4 17.6 11.3 23 12 C17.6 12.7 12.7 17.6 12 23 C11.3 17.6 6.4 12.7 1 12 C6.4 11.3 11.3 6.4 12 1 Z" fill="url(#credGrad)"/>
            <circle cx="12" cy="12" r="2.1" fill="#fffce8" opacity="0.9"/>
          </svg>
          <span class="cnum">0</span>
          <span class="cmul">×1</span>
        </div>
        <div id="timer">1:20<small>WAY OUT IN</small></div>
      </div>
      <div id="danger">
        <div class="lab"><b>DISTANCE</b><span id="dtxt">safe</span></div>
        <div id="track"><div id="fill"></div></div>
      </div>
    </div>
  </div>
  <div id="overlay"></div>
</div>

<script>
/* ============================================================
   SCHMOO'S ESCAPE  — Dreamjourney endless runner
   Built on HTML5 Canvas. Sprites embedded as data URIs below.
   ============================================================ */

/* ---- Leaderboard hookup (wired up later, hardened via Supabase Edge Function) ---- */
const CONFIG = {
  SUPABASE_URL: "",          // <- fill in when we wire the leaderboard
  SUPABASE_ANON_KEY: "",     // <- safe to expose; real validation happens server-side
};
async function submitScore(name, score, runData){
  // Placeholder. Next phase: POST to a Supabase Edge Function that re-simulates
  // the run from `runData` (seed + inputs) before accepting the score.
  if(!CONFIG.SUPABASE_URL) return;
  /* try { await fetch(CONFIG.SUPABASE_URL + "/functions/v1/submit-score", {...}); } catch(e){} */
}

/* ---- Embedded sprite atlases ---- */
const ASSETS = {
  schmooRun: "assets/schmooRun.png",
  schmooDuck: "assets/schmooDuck.png",
  schmooCrouch: "assets/schmooCrouch.png",
  schmooJump: "assets/schmooJump.png",
  gojoRun: "assets/gojoRun.png",
  gojoBonk: "assets/gojoBonk.png",
  // ---- Level 2 (B&W "server escape") ----
  schmoo2Run: "assets/schmoo2Run.png",
  schmoo2Jump: "assets/schmoo2Jump.png",
  schmoo2Crouch: "assets/schmoo2Crouch.png",
  schmoo2Duck: "assets/schmoo2Duck.png",
  rishiRun: "assets/rishiRun.png",
  rishiBonk: "assets/rishiBonk.png",
  // ---- Level 2 -> 3 transition (cyber-surfer hero art; bg already keyed out) ----
  schmooSurf: "assets/schmooSurf.png",

/* ---- Canvas setup ---- */
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  // clientWidth/Height can be 0 before layout settles (data-URI sprites load
  // instantly). Fall back to the viewport so W/H are always finite & positive.
  W = cv.clientWidth  || window.innerWidth  || document.documentElement.clientWidth  || 800;
  H = cv.clientHeight || window.innerHeight || document.documentElement.clientHeight || 600;
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  computeConfig();
}
window.addEventListener('resize', resize);
window.addEventListener('load', resize);

/* ---- Sprites ---- */
const sprites = {};
let loaded=0; const total=Object.keys(ASSETS).length;
for(const k in ASSETS){
  const img = new Image();
  img.onload = ()=>{ loaded++; if(loaded===total) ready(); };
  img.onerror= ()=>{ loaded++; if(loaded===total) ready(); };
  img.src = ASSETS[k];
  sprites[k] = img;
}
const pitImg=new Image(); pitImg.src="assets/pit.png";
/* ---- 404 pit FX: strip the dark "dome" out of the embedded art at load time.
   The image file itself is never modified — we read the decoded pixels once into
   an offscreen canvas and fade the dark interior to transparent so the pit reads
   as an open glowing-crystal hole. Falls back to the original art on any error. ---- */
let pitFX=null, pitFXtried=false;
function buildPitFX(){
  if(pitFX || pitFXtried) return;
  if(!pitImg.complete || !pitImg.naturalWidth) return;   // not decoded yet — retry next frame
  pitFXtried=true;
  try{
    const w=pitImg.naturalWidth, h=pitImg.naturalHeight;
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    const g=c.getContext('2d'); g.drawImage(pitImg,0,0);
    const id=g.getImageData(0,0,w,h), d=id.data, lo=40, hi=120;
    for(let i=0;i<d.length;i+=4){
      const lum=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];   // dark navy interior -> 0 alpha, bright crystals kept
      const fade=lum<=lo?0:(lum>=hi?1:(lum-lo)/(hi-lo));
      d[i+3]*=fade;
    }
    g.putImageData(id,0,0); pitFX=c;
  }catch(e){ pitFX=null; }   // tainted/unsupported -> just use the original image
}
function drawSprite(key, frame, cx, bottomY, drawH, flip=false){
  const m = MANIFEST[key]; const fw = m.w, fh = m.h;
  const dw = drawH * (fw/fh);
  ctx.save();
  const foot = drawH * 8 / fh;   // strips have ~8px transparent pad below the feet; drop sprites so feet meet the ground
  ctx.translate(cx, bottomY - drawH + foot);
  if(flip){ ctx.translate(dw,0); ctx.scale(-1,1); }
  ctx.drawImage(sprites[key], frame*fw, 0, fw, fh, -dw/2 + (flip?dw/2:dw/2), 0, dw, drawH);
  ctx.restore();
}

/* ---- Config (recomputed on resize) ---- */
const C = {};
function computeConfig(){
  C.ground = H*0.82;
  C.charH = H*0.30;                 // drawn cell height for both characters
  C.schmooX = W*0.26;
  C.speed0 = Math.max(W*0.50, 380); // px/sec start
  C.speedMax = Math.max(W*1.55, 1250);
  C.accel = (C.speedMax - C.speed0)/75; // ramps hard early, keeps climbing
  C.jumpH = H*0.36;
  C.airtime = 0.88;                 // seconds in the air
  C.grav = 8*C.jumpH/(C.airtime*C.airtime);
  C.jumpV = 4*C.jumpH/C.airtime;
  C.gapMax = W*0.42;                            // full chase bar
  C.gapCatch = W*0.05;                          // bar empty -> Rishi grabs Schmoo
  C.gapStart = C.gapMax;                        // start clean, parked at the back edge
  C.hitPenalty = (C.gapMax-C.gapCatch)*0.40;    // each stumble jumps him ~40% of the bar closer
  C.recover = W*0.030;                          // bar refilled per second when clean (Rishi drifts back) — slower = harder
  if(level===3) computeConfig3();
}

/* ---- Level music: one track per level, decoded once and looped through the
   same Web Audio context as the SFX (stops the moment the level ends). A
   multi-MB data: URI on an <audio> element is unreliable (play() silently
   rejects in Chrome/Safari), so we fetch + decode each track into a buffer we
   can loop. Buffers are cached by URL so revisiting a level never re-decodes. */
const bgm=document.getElementById('bgm');
const MUSIC_TRACKS = {
  1: (bgm && bgm.getAttribute('src')) || 'assets/bgm.mp3',
  2: 'assets/level2bgm.mp3',
  3: 'assets/level3bgm.mp3',   // finale track; falls back silently if absent
};
function musicUrl(){ return MUSIC_TRACKS[level] || MUSIC_TRACKS[1]; }
let musicBufs={}, musicSrc=null, musicGain=null, musicLoadingUrl=null, musicWanted=false;
const MUSIC_VOL=0.55;
function loadMusic(){
  if(!actx) return;
  const uri=musicUrl(); if(!uri) return;
  if(musicBufs[uri] || musicLoadingUrl===uri) return;       // cached or already in flight
  musicLoadingUrl=uri;
  // Fetch the file (works for a real path like "assets/bgm.mp3" and for data: URIs),
  // then decode it once into a buffer we can loop.
  fetch(uri)
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.arrayBuffer(); })
    .then(buf=>actx.decodeAudioData(buf,
      b=>{ musicBufs[uri]=b; if(musicLoadingUrl===uri) musicLoadingUrl=null;
           if(musicWanted && musicUrl()===uri) startMusic(); },   // only autostart if still the current level's track
      ()=>{ if(musicLoadingUrl===uri) musicLoadingUrl=null; }))
    .catch(()=>{ if(musicLoadingUrl===uri) musicLoadingUrl=null; });
}
function startMusic(){
  musicWanted=true;
  if(!actx) return;
  if(actx.state==='suspended'){ try{ actx.resume(); }catch(e){} }
  const uri=musicUrl(), buf=musicBufs[uri];
  if(!buf){ loadMusic(); return; }                          // not decoded yet — load, then this fires again
  try{ if(musicSrc){ musicSrc.stop(); musicSrc.disconnect(); } }catch(e){}
  musicSrc=actx.createBufferSource(); musicSrc.buffer=buf; musicSrc.loop=true;
  musicGain=actx.createGain(); musicGain.gain.value=MUSIC_VOL;
  musicSrc.connect(musicGain); musicGain.connect(actx.destination);
  try{ musicSrc.start(0); }catch(e){}
}
function stopMusic(){
  musicWanted=false;
  try{ if(musicSrc){ musicSrc.stop(); musicSrc.disconnect(); } }catch(e){}
  musicSrc=null;
}
function initAudio(){
  if(actx){ if(actx.state==='suspended') actx.resume(); return; }
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; }
}
function coinSound(mult){
  if(!actx) return;
  const t=actx.currentTime, o=actx.createOscillator(), o2=actx.createOscillator(), g=actx.createGain();
  const base=760 + Math.min(mult-1,4)*70;
  o.type='triangle'; o2.type='sine';
  o.frequency.setValueAtTime(base,t);
  o.frequency.exponentialRampToValueAtTime(base*1.5, t+0.07);
  o2.frequency.setValueAtTime(base*2.01,t);
  o2.frequency.exponentialRampToValueAtTime(base*3, t+0.07);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.11,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.20);
  o.connect(g); o2.connect(g); g.connect(actx.destination);
  o.start(t); o2.start(t); o.stop(t+0.22); o2.stop(t+0.22);
}

/* ---- Obstacles ---- */
function spawn(){
  const r = rng();
  let kind;
  if(r < 0.55){
    const vw = W*(0.26 + rng()*0.06);                // 404 pit width (big; sits in the ground)
    obstacles.push({type:'low', x:W+60, vw, w:vw*0.40, h:H*0.11, hit:false, scored:false});
    kind='low';
  } else {
    const gap = C.charH*0.52;                          // duck clearance (jumping = faceplant)
    const cw  = W*(0.25+rng()*0.03);                   // chained-sign duck column
    obstacles.push({type:'high', x:W+60, w:cw, gap, hit:false, scored:false});
    kind='high';
  }
  // Credits are sporadic — most obstacles have none.
  const roll = rng();
  if(roll < 0.24){
    // sometimes reward the move with a formation around this obstacle
    if(kind==='low') spawnCreditArc(W+60 - W*0.05);
    else             spawnCreditRow(W+60 - W*0.015, C.ground - C.charH*0.16, 3);
  } else if(roll < 0.34){
    // occasionally a lone run-height row floating in the open lane ahead
    spawnCreditRow(W+60 + W*(0.20+rng()*0.10), C.ground - C.charH*0.34, 3 + (rng()*2|0));
  }
  // else: no credits this time
}
function addCredit(x,y){
  credits.push({x, y, r:C.charH*0.115, t:rng()*6.283, got:false});
}
function spawnCreditArc(x0){
  const n=5, span=W*0.17;
  const baseY=C.ground - C.charH*0.34;
  const peak =C.ground - C.charH*0.34 - C.jumpH*0.86;
  for(let i=0;i<n;i++){
    const f=i/(n-1);
    addCredit(x0 + f*span, baseY - Math.sin(f*Math.PI)*(baseY-peak));
  }
}
function spawnCreditRow(x0, y, n){
  const dx=W*0.052;
  for(let i=0;i<n;i++) addCredit(x0 + i*dx, y);
}
function collectCredit(cr){
  cr.got=true;
  creditsTotal++;
  bankedCredits++;                         // rolls over across levels; spent on rerolls in L3
  creditStreak++;
  creditMult = 1;                          // stars are a flat 1 point each now
  const gain = 1;
  score += gain;
  floaters.push({x:cr.x, y:cr.y - cr.r, vy:-70, life:0.85, max:0.85,
                 txt:'+'+gain, mul:creditMult});
  for(let i=0;i<11;i++){
    const a=rng()*6.283, sp=70+rng()*180;
    sparks.push({x:cr.x, y:cr.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-50,
                 life:0.45+rng()*0.35, max:0.8, gold: rng()<0.5});
  }
  coinSound(creditMult);
  const chip=document.getElementById('creds');
  if(chip){ chip.classList.remove('bump'); void chip.offsetWidth; chip.classList.add('bump'); }
}
function circleHitsBox(cx,cy,r,b){
  const nx=Math.max(b.x, Math.min(cx, b.x+b.w));
  const ny=Math.max(b.y, Math.min(cy, b.y+b.h));
  const dx=cx-nx, dy=cy-ny;
  return dx*dx+dy*dy <= r*r;
}
function schmooHitbox(){
  const feet=C.ground - (schmoo.onGround?0:schmoo.y);
  const w=C.charH*0.20, inset=C.charH*0.05, full=C.charH*0.62;
  const ducking=(schmoo.ducking || schmoo.duckGrace>0) && schmoo.onGround;
  const h = ducking ? full*0.46 : full;
  return {x:C.schmooX-w/2, y:feet-inset-h, w, h};
}
function obstacleBox(o){
  if(o.type==='low'){ const ix=o.w*0.12; return {x:o.x+ix, y:C.ground-o.h, w:o.w-2*ix, h:o.h}; }
  // ERROR WALL: spans ceiling -> duck gap, so it can't be jumped, only ducked
  const ix=o.w*0.16;
  return {x:o.x+ix, y:0, w:o.w-2*ix, h:C.ground - o.gap};
}
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

/* ---- Update ---- */
function update(dt){
  if(taunt){ taunt.life-=dt; if(taunt.life<=0) taunt=null; }
  if(skyFlash){ skyFlash.life-=dt; if(skyFlash.life<=0) skyFlash=null; }
  if(state==='transition'){ updateTransition(dt); return; }
  if(state!=='playing'){ if(bonk.on) updateBonk(dt); return; }
  if(level===3){ update3(dt); return; }
  elapsed+=dt;
  speed=Math.min(C.speedMax, C.speed0 + elapsed*C.accel);
  scrollX += speed*dt;
  updateCorruption(dt);

  // Schmoo vertical
  if(!schmoo.onGround){
    schmoo.vy += C.grav*dt; schmoo.y -= schmoo.vy*dt;
    if(schmoo.y<=0){ schmoo.y=0; schmoo.vy=0; schmoo.onGround=true; }
  }
  if(schmoo.duckGrace>0) schmoo.duckGrace-=dt;

  // animation frames
  frameT+=dt;
  const fi = Math.max(0.05, 0.085*(C.speed0/speed));
  if(frameT>=fi){ frameT=0; runFrame=(runFrame+1)%MANIFEST[skin().run].frames; }
  jumpFrame = schmoo.vy<0 ? (schmoo.y> C.jumpH*0.5?1:0)
            : Math.min(3, 2 + (schmoo.y<C.jumpH*0.4?1:0));
  gojoFrameT+=dt;
  const gfi = Math.max(0.05, 0.08*(C.speed0/speed));
  if(gojoFrameT>=gfi){ gojoFrameT=0; gojoFrame=(gojoFrame+1)%MANIFEST[skin().chaserRun].frames; }

  // spawn
  // spawn (halts once the way-out sequence begins)
  if(escapePhase==='none'){
    spawnTimer-=dt;
    if(spawnTimer<=0){
      spawn();
      const minGap = speed*(C.airtime*1.25);             // fair spacing vs jump airtime
      spawnTimer = (minGap + W*(0.10+rng()*0.28))/speed;
    }
  }
  updateEscape(dt);

  // move + score + collide
  const hb=schmooHitbox();
  for(const o of obstacles){
    o.x -= speed*dt;
    if(!o.hit && overlap(hb, obstacleBox(o))){
      o.hit=true; gojoGap-=C.hitPenalty; shake=14; flash=1;
      creditStreak=0; creditMult=1;            // bonk breaks the multiplier
      if(navigator.vibrate) navigator.vibrate(40);
      if(Math.random()<0.7) popTaunt();         // sporadic Rishi heckle
    }
    if(!o.scored && o.x+o.w < C.schmooX){ o.scored=true; if(!o.hit){ score++; } }
  }
  obstacles = obstacles.filter(o=> o.x+o.w > -40);

  // credits: move, collect, cull
  for(const cr of credits){
    cr.x -= speed*dt;
    cr.t += dt;
    cr.y += Math.sin(cr.t*2.4)*8*dt;                 // gentle bob
    if(!cr.got && circleHitsBox(cr.x, cr.y, cr.r*1.15, hb)) collectCredit(cr);
  }
  credits = credits.filter(cr=> !cr.got && cr.x + cr.r > -40);

  // bonus collectible — only one on screen at a time
  if(bonus){
    bonus.x -= speed*dt; bonus.t += dt;
    bonus.y += Math.sin(bonus.t*2.2)*(bonus.type==='rocket'?7:11)*dt;
    if(!bonus.got && circleHitsBox(bonus.x, bonus.y, bonus.r*0.85, hb)) collectBonus();
    if(bonus && bonus.x + bonus.r < -50) bonus=null;
  } else {
    bonusTimer -= dt;
    if(bonusTimer<=0){ spawnBonus(); bonusTimer = 7 + rng()*6; }
  }

  // particles
  tickParticles(dt);

  // Rishi chase: recover when clean, drift in slowly as it speeds up
  const drift = (speed/C.speedMax)*C.recover*0.55;
  gojoGap += (C.recover - drift)*dt;
  gojoGap = Math.min(C.gapMax, gojoGap);
  if(gojoGap <= C.gapCatch){ caught(); }

  shake*=Math.pow(0.001,dt); if(shake<0.4) shake=0;
  flash*=Math.pow(0.02,dt);
}
function tickParticles(dt){
  for(const s of sparks){ s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=520*dt; s.life-=dt; }
  sparks = sparks.filter(s=> s.life>0);
  for(const f of floaters){ f.y+=f.vy*dt; f.vy*=Math.pow(0.1,dt); f.life-=dt; }
  floaters = floaters.filter(f=> f.life>0);
}
function won(){
  state='won';
  stopMusic();
  best=Math.max(best,score);
  // celebratory pop
  shake=8; flash=0;
  for(let i=0;i<30;i++){
    const a=rng()*6.283, sp=120+rng()*260;
    sparks.push({x:vortex.x, y:vortex.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-60,
                 life:0.6+rng()*0.4, max:1, r:2+rng()*2, hue:rng()});
  }
  if(navigator.vibrate) navigator.vibrate([30,40,80]);
  setTimeout(level===2 ? startTransition : showWin, 700);   // level 2 -> cyberspace transition; else normal win screen
}
function updateEscape(dt){
  // Called from update() while playing, once the level timer is up.
  if(escapePhase==='none'){
    if(elapsed>=LEVEL_TIME){ escapePhase='telegraph'; escapeT=0; popWayOut(); }
    return;
  }
  escapeT+=dt;
  if(escapePhase==='telegraph'){
    // obstacles already on screen keep coming; we just stopped spawning new ones.
    if(escapeT>=ESCAPE_TELEGRAPH){
      escapePhase='vortex'; escapeT=0;
      // sky vortex: centered around the apex of a jump, flies in from the right
      const skyY = C.ground - C.jumpH*0.82;
      vortex={ x:W+C.charH*0.8, y:skyY, r:C.charH*0.46, t:0, hit:false };
    }
    return;
  }
  if(escapePhase==='vortex' && vortex){
    vortex.t+=dt;
    vortex.x -= speed*dt;
    vortex.y += Math.sin(vortex.t*2.0)*6*dt;   // gentle bob
    const feet=C.ground - (schmoo.onGround?0:schmoo.y);
    const sx=C.schmooX, sy=feet - C.charH*0.45;  // Schmoo's body center
    const dx=sx-vortex.x, dy=sy-vortex.y;
    const reach=vortex.r + C.charH*0.22;
    if(!vortex.hit && (dx*dx+dy*dy) < reach*reach && !schmoo.onGround){
      vortex.hit=true; won(); return;           // clutch airborne catch = escape
    }
    // vortex slid past Schmoo and he never jumped into it → Rishi pounces
    if(!vortex.hit && vortex.x < sx - reach){
      caught();
    }
  }
}
function caught(){
  state='gameover';
  stopMusic();
  best=Math.max(best,score);
  if(level===3){ caught3(); return; }   // flight finale: no bat-bonk; Rishi-catch anim comes later
  // Rishi doesn't stop at one hit — he winds up and bonks 4 or 5 times.
  bonk={on:true, frame:0, t:0, done:false, reps:0, target:4 + (rng()<0.5?0:1), impacted:false};
  best=Math.max(best,score);
}
function bonkImpact(){
  // the bat connects: jolt the scene, flash, flinch Schmoo, pop a BONK
  shake=17; flash=0.7;
  schmoo.flinch=0.22;
  const last = bonk.reps >= bonk.target-1;
  floaters.push({x:C.schmooX + C.charH*0.06, y:C.ground - C.charH*0.55,
                 vy:-30, life:0.55, max:0.55, kind:'bonk',
                 txt: last ? 'BONK!!' : 'BONK!', rot:(rng()-0.5)*0.5});
  if(navigator.vibrate) navigator.vibrate(70);
  bonkBlip(bonk.reps);
}
function bonkBlip(rep){
  if(!actx) return;
  const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type='square';
  const base=150 - Math.min(rep,4)*10;          // each hit a touch lower/heavier
  o.frequency.setValueAtTime(base*3, t);
  o.frequency.exponentialRampToValueAtTime(base, t+0.10);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.16, t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.16);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+0.18);
}
function updateBonk(dt){
  if(schmoo.flinch>0) schmoo.flinch-=dt;
  bonk.t+=dt;
  const FRAME_T=0.058;                            // snappy swing
  if(bonk.t>=FRAME_T){
    bonk.t=0;
    if(bonk.frame < MANIFEST[skin().chaserBonk].frames-1){
      bonk.frame++;
    } else {
      // one full swing finished
      bonk.reps++;
      if(bonk.reps < bonk.target){
        bonk.frame=0; bonk.impacted=false;        // rewind, swing again
      } else if(!bonk.done){
        bonk.done=true; showGameOver();
      }
    }
    // bat connects on the skin's impact frame (fully extended toward Schmoo)
    if(!bonk.impacted && bonk.frame===skin().impactFrame){ bonk.impacted=true; bonkImpact(); }
  }
  tickParticles(dt);
  shake*=Math.pow(0.0015,dt); if(shake<0.4) shake=0;
  flash*=Math.pow(0.02,dt);
}

/* ============================  RENDER  ============================ */
function lerpHue(){ return; }
function drawBackground(t){
  if(level===2){ drawBackgroundBW(t); return; }
  // advance cosmetic-only shooting stars (own RNG so gameplay spawns stay untouched)
  const bdt=Math.min(0.05, Math.max(0, t-bgLastT)); bgLastT=t;
  shootCD-=bdt;
  if(shootCD<=0 && shootStars.length<2){
    shootStars.push({x:W*(0.66+Math.random()*0.5), y:H*(0.04+Math.random()*0.30),
      vx:-(W*0.85+Math.random()*W*0.5), vy:(H*0.22+Math.random()*H*0.22),
      life:0, max:0.55+Math.random()*0.35});
    shootCD=3+Math.random()*5;
  }
  for(const ss of shootStars){ ss.life+=bdt; ss.x+=ss.vx*bdt; ss.y+=ss.vy*bdt; }
  shootStars=shootStars.filter(s=> s.life<s.max && s.x>-W*0.35 && s.y<H);

  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#05030f'); g.addColorStop(0.20,'#120a33');
  g.addColorStop(0.44,'#2a1257'); g.addColorStop(0.66,'#5a1f73');
  g.addColorStop(0.84,'#9c3071'); g.addColorStop(1,'#d05a72');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // portal orb (slow parallax sun) with soft outer bloom + off-axis core highlight
  let px=((W*0.74 - scrollX*0.04)%(W*1.9)+W*1.9)%(W*1.9)-W*0.25; const oy=H*0.28, orad=H*0.17;

let grainPat=null, grainCanvas=null;
function ensureGrain(){

// A lit, faceted crystal spire — gradient faces, inner sheen, rim light + glow halo.
// hue: degrees. sat: 0..1. haze: 0..1 atmospheric fade toward sky. silhouette: dark foreground.
function gemSpire(cx, baseY, w, h, hue, sat, haze, silhouette){
  hue=hue|0;
  const topY=baseY-h, midY=topY+h*0.30, s=Math.round(sat*100);
  const apex=[cx,topY], lsh=[cx-w*0.5,midY], rsh=[cx+w*0.5,midY];
  const lb=[cx-w*0.34,baseY], rb=[cx+w*0.34,baseY], cmid=[cx,midY], cb=[cx,baseY];

    const grd=ctx.createLinearGradient(cx,topY,cx,baseY);
    grd.addColorStop(0,`hsla(${hue},42%,15%,1)`); grd.addColorStop(1,'hsla(258,55%,6%,1)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.moveTo(apex[0],apex[1]); ctx.lineTo(rsh[0],rsh[1]); ctx.lineTo(rb[0],rb[1]);
    ctx.lineTo(lb[0],lb[1]); ctx.lineTo(lsh[0],lsh[1]); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(120,220,255,0.22)'; ctx.lineWidth=Math.max(1,w*0.02);
    ctx.beginPath(); ctx.moveTo(apex[0],apex[1]); ctx.lineTo(lsh[0],lsh[1]); ctx.lineTo(lb[0],lb[1]); ctx.stroke();
    return;
  }
  // glow halo behind
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const halo=ctx.createRadialGradient(cx,midY,0,cx,midY,w*1.3);
  halo.addColorStop(0,`hsla(${hue},${s}%,60%,${0.22*(1-haze*0.5)})`); halo.addColorStop(1,`hsla(${hue},${s}%,60%,0)`);
  ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(cx,midY,w*1.3,0,6.283); ctx.fill();
  ctx.restore();
  const mix=(l)=>`hsla(${hue},${Math.round(s*(1-haze*0.5))}%,${Math.min(96,Math.round(l+haze*22))}%,1)`;
  // left lit face
  const lg=ctx.createLinearGradient(apex[0],apex[1],lb[0],lb[1]);
  lg.addColorStop(0,mix(76)); lg.addColorStop(1,mix(50)); ctx.fillStyle=lg;
  ctx.beginPath(); ctx.moveTo(apex[0],apex[1]); ctx.lineTo(lsh[0],lsh[1]); ctx.lineTo(lb[0],lb[1]); ctx.lineTo(cb[0],cb[1]); ctx.lineTo(cmid[0],cmid[1]); ctx.closePath(); ctx.fill();
  // right shadow face
  const rgg=ctx.createLinearGradient(apex[0],apex[1],rb[0],rb[1]);
  rgg.addColorStop(0,mix(44)); rgg.addColorStop(1,mix(30)); ctx.fillStyle=rgg;
  ctx.beginPath(); ctx.moveTo(apex[0],apex[1]); ctx.lineTo(cmid[0],cmid[1]); ctx.lineTo(cb[0],cb[1]); ctx.lineTo(rb[0],rb[1]); ctx.lineTo(rsh[0],rsh[1]); ctx.closePath(); ctx.fill();
  // upper-left bright facet
  ctx.fillStyle=mix(70);
  ctx.beginPath(); ctx.moveTo(apex[0],apex[1]); ctx.lineTo(lsh[0],lsh[1]); ctx.lineTo(cmid[0],cmid[1]); ctx.closePath(); ctx.fill();
  // inner vertical sheen (additive, narrow — the gem 'core')
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const core=ctx.createLinearGradient(cx,topY+h*0.10,cx,baseY);
  core.addColorStop(0,`hsla(${hue},${s}%,92%,${0.5*(1-haze*0.4)})`); core.addColorStop(1,`hsla(${hue},${s}%,80%,0)`);
  ctx.fillStyle=core;
  ctx.beginPath(); ctx.moveTo(cx,topY+h*0.10); ctx.lineTo(cx-w*0.09,midY+h*0.12); ctx.lineTo(cx,midY+h*0.55); ctx.lineTo(cx+w*0.09,midY+h*0.12); ctx.closePath(); ctx.fill();
  ctx.restore();

  ctx.beginPath(); ctx.moveTo(apex[0],apex[1]); ctx.lineTo(lsh[0],lsh[1]); ctx.lineTo(lb[0],lb[1]); ctx.stroke();
}
function crystal(cx, baseY, w, h, fill, alpha){

function drawChain(x,y0,y1,ct,hit){

  ctx.lineWidth=Math.max(1.5,ct*0.5); const step=ct*2.2; let v=true;

function fitFont(weight, px, fam, txt, maxW){
  // shrink font so txt fits maxW; returns the px actually used
  let p=px; ctx.font=`${weight} ${p}px ${fam}`;
  let m=ctx.measureText(txt).width;
  if(m>maxW){ p=p*maxW/m; ctx.font=`${weight} ${p}px ${fam}`; }
  return p;
}
function drawErrorSign(x,y,w,h,hit,t,ax1,ax2){
  const r=h*0.20;
  const main = hit ? '#ff8aa0' : '#ff2e44';
  const glow = hit ? 'rgba(255,130,160,.95)' : 'rgba(255,46,66,.9)';
  // occasional neon flicker — sells the "broken" feel
  const flick = (Math.sin(t*36 + x*0.7) > 0.92) ? 0.5 : 1;
  ctx.save();
  ctx.textBaseline='middle';

  // glassy plate body
  roundRect(x,y,w,h,r);
  const pg=ctx.createLinearGradient(0,y,0,y+h);
  pg.addColorStop(0,'rgba(34,9,22,0.97)'); pg.addColorStop(1,'rgba(9,4,14,0.97)');
  ctx.fillStyle=pg; ctx.shadowColor=glow; ctx.shadowBlur=h*0.55; ctx.fill();
  ctx.shadowBlur=0;
  // top sheen
  roundRect(x+w*0.012,y+h*0.05,w*0.976,h*0.30,r*0.7);
  ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fill();

  // double neon border (dark base + bright inner line)

  ctx.strokeStyle='rgba(110,8,22,0.95)'; ctx.lineWidth=Math.max(3,h*0.07); ctx.stroke();
  roundRect(x+3,y+3,w-6,h-6,r*0.8);
  ctx.strokeStyle=main; ctx.lineWidth=Math.max(1.6,h*0.026);
  ctx.shadowColor=glow; ctx.shadowBlur=h*0.30; ctx.globalAlpha=flick; ctx.stroke();
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // chain mount bolts exactly where the chains land

    ctx.beginPath(); ctx.arc(ax, y+h*0.02, h*0.075, 0, 6.283);
    ctx.fillStyle='#241a2c'; ctx.fill();
    ctx.lineWidth=Math.max(1.5,h*0.02); ctx.strokeStyle=main;
    ctx.shadowColor=glow; ctx.shadowBlur=h*0.18; ctx.stroke(); ctx.shadowBlur=0;
  }

  // warning triangle glyph (left)
  const gcx=x+h*0.66, gcy=y+h*0.52, gr=h*0.30;
  ctx.beginPath();
  ctx.moveTo(gcx, gcy-gr); ctx.lineTo(gcx+gr*0.95, gcy+gr*0.72); ctx.lineTo(gcx-gr*0.95, gcy+gr*0.72); ctx.closePath();

  ctx.shadowColor=glow; ctx.shadowBlur=h*0.22; ctx.globalAlpha=flick; ctx.stroke();
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.fillStyle=main; ctx.textAlign='center';
  ctx.font=`900 ${h*0.30}px Orbitron, sans-serif`;
  ctx.fillText('!', gcx, gcy+gr*0.16);

  // text block (auto-fit so it never overflows the plate)

  ctx.fillStyle='#fff'; ctx.shadowColor=glow; ctx.shadowBlur=h*0.30; ctx.globalAlpha=flick;
  ctx.fillText('ERROR', tx, y+h*0.40);

  ctx.font=`700 ${p2}px Quicksand, sans-serif`;

    ctx.quadraticCurveTo(0,s*0.5,-s*0.18,s*0.36); ctx.lineTo(-s*0.18,0);
    ctx.quadraticCurveTo(-s*0.18,-s*0.28,0,-s*0.5); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#e8304a';
    ctx.beginPath(); ctx.moveTo(0,-s*0.5); ctx.quadraticCurveTo(s*0.18,-s*0.28,0,-s*0.18);
    ctx.quadraticCurveTo(-s*0.18,-s*0.28,0,-s*0.5); ctx.closePath(); ctx.fill();
    // blue identity band under the nose (red · white · blue)
    ctx.fillStyle='#1e62ff'; ctx.fillRect(-s*0.18, -s*0.145, s*0.36, s*0.085);
    ctx.fillStyle='#1e90ff'; ctx.beginPath(); ctx.arc(0,s*0.02,s*0.10,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(-s*0.03,-s*0.01,s*0.035,0,6.283); ctx.fill();
    ctx.fillStyle='#e8304a'; ctx.fillRect(-s*0.18,s*0.22,s*0.36,s*0.05);
  } else {
    ctx.rotate(Math.sin(b.t*2)*0.05);
    const topY=-s*0.32, halfTop=s*0.42, apex=s*0.56;
    ctx.shadowColor='rgba(255,190,70,.5)'; ctx.shadowBlur=16;
    // cheese body — triangle with a gently domed top edge
    const cg=ctx.createLinearGradient(0,topY,0,apex);
    cg.addColorStop(0,'#ffd86b'); cg.addColorStop(0.55,'#ffc23c'); cg.addColorStop(1,'#efa42c');
    ctx.fillStyle=cg; ctx.beginPath();
    ctx.moveTo(-halfTop, topY);
    ctx.quadraticCurveTo(0, topY+s*0.07, halfTop, topY);
    ctx.lineTo(0, apex); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    // faint edge definition on the two slant sides
    ctx.strokeStyle='rgba(200,130,30,0.45)'; ctx.lineWidth=Math.max(1,s*0.012); ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(-halfTop,topY); ctx.lineTo(0,apex); ctx.lineTo(halfTop,topY); ctx.stroke();
    // crust — a rounded baked band across the wide top
    ctx.beginPath();
    ctx.moveTo(-halfTop-s*0.015, topY+s*0.015);
    ctx.quadraticCurveTo(0, topY - s*0.26, halfTop+s*0.015, topY+s*0.015);
    ctx.quadraticCurveTo(0, topY + s*0.075, -halfTop-s*0.015, topY+s*0.015);
    ctx.closePath();
    const crg=ctx.createLinearGradient(0,topY-s*0.26,0,topY+s*0.07);
    crg.addColorStop(0,'#e29a4c'); crg.addColorStop(1,'#b56f28');
    ctx.fillStyle=crg; ctx.fill();
    // crust top sheen
    ctx.strokeStyle='rgba(255,224,170,0.55)'; ctx.lineWidth=Math.max(1.4,s*0.02);
    ctx.beginPath(); ctx.moveTo(-halfTop*0.8, topY-s*0.10);
    ctx.quadraticCurveTo(0, topY - s*0.22, halfTop*0.8, topY-s*0.10); ctx.stroke();
    // pepperoni (rim + disc + highlight)
    const pep=[[-0.15,-0.10,0.082],[0.15,-0.05,0.075],[-0.02,0.12,0.07],[0.04,-0.21,0.055]];
    for(const p of pep){ const px=s*p[0], py=s*p[1], pr=s*p[2];
      ctx.fillStyle='#9e2420'; ctx.beginPath(); ctx.arc(px,py,pr*1.12,0,6.283); ctx.fill();
      ctx.fillStyle='#d4382d'; ctx.beginPath(); ctx.arc(px,py,pr,0,6.283); ctx.fill();
      ctx.fillStyle='rgba(255,150,130,0.5)'; ctx.beginPath(); ctx.arc(px-pr*0.3,py-pr*0.3,pr*0.34,0,6.283); ctx.fill();
    }
    // herb flecks + cheese highlight
    ctx.fillStyle='#3c7d2e';
    ctx.beginPath(); ctx.arc(s*0.08,s*0.0,s*0.018,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(-s*0.10,s*0.06,s*0.016,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.beginPath(); ctx.ellipse(-s*0.05,-s*0.02,s*0.06,s*0.035,-0.4,0,6.283); ctx.fill();
  }
  ctx.restore();
}
function drawObstacle(o,t){
  // Both levels use the colourful 404 pits + red neon "generation failed" signs.
  const b=obstacleBox(o);
  ctx.save();
  const glow = o.hit ? '#ff5d7a' : '#67e8ff';
  ctx.shadowColor=glow; ctx.shadowBlur=18;
  if(o.type==='low'){
    // 404 pit — a glowing crystal hole punched into the ground; jump over it
    const cx=o.x+o.w/2, vw=o.vw, vh=vw*((pitImg.naturalHeight/pitImg.naturalWidth)||0.61);
    const x0=cx-vw/2, y0=C.ground - vh*0.02;
    buildPitFX();
    const src = pitFX || pitImg;            // de-domed art if ready, else original
    ctx.save();
    ctx.shadowColor=o.hit?'#ff6a8a':'#7b5bff'; ctx.shadowBlur=22;
    if(pitImg.complete && pitImg.naturalWidth){
      // intermittent digital glitch — brief horizontal shake + a couple of torn slices.
      // purely cosmetic; the hitbox (obstacleBox) is unaffected.
      const ph=t*2.3 + o.x*0.05;
      const glitching = Math.sin(ph)*Math.sin(ph*2.7) > 0.62;
      const jx = glitching ? (Math.random()*2-1)*vw*0.018 : 0;   // ~±2% width shake
      const jy = glitching ? (Math.random()*2-1)*vh*0.006 : 0;
      ctx.drawImage(src, x0+jx, y0+jy, vw, vh);
      if(glitching){
        const sw=src.width||pitImg.naturalWidth, sh=src.height||pitImg.naturalHeight;
        for(let k=0;k<2;k++){                                    // sliced tearing
          const sy=Math.random()*sh*0.78, shh=sh*(0.05+Math.random()*0.07);
          const dx=(Math.random()*2-1)*vw*0.05;
          ctx.drawImage(src, 0, sy, sw, shh, x0+dx, y0+(sy/sh)*vh, vw, (shh/sh)*vh);
        }
      }
    } else { ctx.fillStyle=o.hit?'#ff6a8a':'#7ad0ff'; roundRect(b.x,b.y,b.w,b.h,4); ctx.fill(); }
    ctx.restore();
  } else {
    // chained "generation error" sign — crisp vector neon, duck only
    const gy=C.ground - o.gap, w=o.w;
    const bw=w*1.6, bx=o.x+w/2-bw/2;
    const sh=bw*0.34;
    const sy=gy - sh, atop=sy+sh*0.10;
    const ax1=bx+bw*0.16, ax2=bx+bw*0.84, ct=Math.max(4,bw*0.018);
    const sway=Math.sin(t*1.5 + o.x*0.012)*0.035, pivX=(ax1+ax2)/2;
    ctx.save(); ctx.translate(pivX,0); ctx.rotate(sway); ctx.translate(-pivX,0);
    drawChain(ax1,0,atop,ct,o.hit); drawChain(ax2,0,atop,ct,o.hit);
    drawErrorSign(bx, sy, bw, sh, o.hit, t, ax1, ax2);
    ctx.restore();
    // soft duck-gap shimmer
    ctx.save(); ctx.globalAlpha=0.4; ctx.strokeStyle='#6cf0ff'; ctx.lineWidth=2;
    ctx.setLineDash([6,10]); ctx.lineDashOffset=-scrollX*0.5;
    ctx.beginPath(); ctx.moveTo(o.x-w*0.05, gy); ctx.lineTo(o.x+w*1.05, gy); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ---- Credits (four-point sparkle, teal→gold) ---- */
function sparklePath(cx,cy,R,inner){
  const ri=R*inner;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const ang=-Math.PI/2 + i*Math.PI/4;
    const rad=(i%2===0)?R:ri;
    const x=cx+Math.cos(ang)*rad, y=cy+Math.sin(ang)*rad;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function drawCredit(cr, t){
  if(level===2){ drawCreditBW(cr,t); return; }
  const R=cr.r * (1 + Math.sin(cr.t*3.0)*0.06);     // pulse
  const cx=cr.x, cy=cr.y;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.sin(cr.t*1.3)*0.18);              // slow rock
  // outer glow
  ctx.shadowColor='rgba(255,196,72,.9)'; ctx.shadowBlur=22;
  const g=ctx.createLinearGradient(0,-R,0,R);
  g.addColorStop(0,'#fff1b8'); g.addColorStop(0.45,'#ffd24a'); g.addColorStop(1,'#ef9b1c');
  ctx.fillStyle=g;
  sparklePath(0,0,R,0.40); ctx.fill();
  // inner crisp pass (no shadow) for clean edges
  ctx.shadowBlur=0;
  ctx.fillStyle=g; sparklePath(0,0,R*0.96,0.40); ctx.fill();
  // bright core
  const cg=ctx.createRadialGradient(0,-R*0.1,0, 0,0,R*0.5);
  cg.addColorStop(0,'rgba(255,253,232,.95)'); cg.addColorStop(1,'rgba(255,253,232,0)');
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.arc(0,0,R*0.5,0,6.283); ctx.fill();
  ctx.restore();
}
function drawCredits(t){ for(const cr of credits) drawCredit(cr,t); }
function drawSparks(){
  const bw = level===2;

}
function drawFloaters(){
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const f of floaters){
    const a=Math.max(0, f.life/f.max);
    if(f.kind==='bonk'){
      const pop = 1.25 - 0.25*a;                 // pop in: big then settle
      const sz = C.charH*0.22 * pop;
      ctx.save();
      ctx.translate(f.x, f.y); ctx.rotate(f.rot||0);
      ctx.globalAlpha=a;
      ctx.font=`900 ${sz}px Orbitron, sans-serif`;
      ctx.lineWidth=Math.max(2, sz*0.10); ctx.strokeStyle='rgba(10,7,23,.9)';

      ctx.fillStyle='#ff5d7a';

    const sz = (f.mul>1?20:16) * (0.7+0.3*a);

function drawCharacters(){
  const S=skin();
  // Rishi (chaser) — clamp on-screen at left, true distance shown in HUD
  const gojoX = chaseX();
  if(state==='gameover' && bonk.on){
    const lunge = (bonk.frame===2||bonk.frame===3) ? C.charH*0.07 : 0;  // step into the swing
    drawSprite(S.chaserBonk, bonk.frame, C.schmooX - C.charH*0.30 + lunge, C.ground, C.charH);
  } else {
    const gojoBob = Math.abs(Math.sin(gojoFrame/MANIFEST[S.chaserRun].frames*Math.PI*2))*5;
    drawSprite(S.chaserRun, gojoFrame, gojoX, C.ground+gojoBob, C.charH);
  }
  // Schmoo
  const feet=C.ground - (schmoo.onGround?0:schmoo.y);
  if(state==='gameover'){
    const fl = schmoo.flinch>0 ? schmoo.flinch : 0;
    const jolt = fl>0 ? Math.sin(fl*70)*C.charH*0.035 : 0;   // recoil shudder on each hit
    const df = fl>0 ? 0 : Math.min(MANIFEST[S.duck].frames-1, 1);
    drawSprite(S.duck, df, C.schmooX + jolt, C.ground, C.charH);

  } else {
    drawSprite(S.run, runFrame, C.schmooX, C.ground, C.charH*S.runScale);
  }
}

function wrapText(txt,maxW){
  const words=txt.split(' '); const lines=[]; let cur='';
  for(const w of words){ const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>maxW && cur){ lines.push(cur); cur=w; } else cur=test; }
  if(cur) lines.push(cur); return lines;
}
function drawVortex(t){
  if(escapePhase!=='vortex' || !vortex) return;
  const {x,y,r}=vortex;
  ctx.save();
  ctx.translate(x,y);
  // outer glow
  ctx.shadowColor='#7b5bff'; ctx.shadowBlur=34;
  // swirling rings
  const rings=5;
  for(let i=0;i<rings;i++){
    const rr = r*(1 - i*0.16);
    const spin = t*(1.6 + i*0.5) + i*0.9;
    ctx.save();
    ctx.rotate(spin);
    ctx.globalAlpha = 0.85 - i*0.12;
    const hue = 250 + i*16;
    ctx.strokeStyle = `hsl(${hue} 90% ${60 - i*5}%)`;
    ctx.lineWidth = Math.max(2, r*0.10 - i*1.2);
    ctx.beginPath();
    // spiral-ish open arcs
    ctx.arc(0,0, rr, 0, Math.PI*1.5);
    ctx.stroke();
    ctx.restore();
  }
  // bright core
  ctx.globalAlpha=1; ctx.shadowBlur=24; ctx.shadowColor='#cdb8ff';
  const cg=ctx.createRadialGradient(0,0,0, 0,0,r*0.5);
  cg.addColorStop(0,'#ffffff'); cg.addColorStop(0.5,'#b69bff'); cg.addColorStop(1,'rgba(123,91,255,0)');
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.arc(0,0,r*0.5,0,6.283); ctx.fill();
  ctx.restore();

  // pulsing "EXIT" tag under the portal
  ctx.save();
  ctx.globalAlpha=0.75+0.25*Math.sin(t*6);
  ctx.font=`800 ${Math.max(11,H*0.022)}px Orbitron, sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='#d9ccff';
  ctx.shadowColor='#7b5bff'; ctx.shadowBlur=10;
  ctx.fillText('ESCAPE', x, y+r+H*0.035);
  ctx.restore();
}
function drawTaunt(){
  if(!taunt) return;
  const k    = Math.min(1,(taunt.max-taunt.life)/0.16);   // pop-in
  const fade = Math.min(1, taunt.life/0.4);               // fade-out
  const a = Math.min(k,fade);
  const rishiX = chaseX();
  const headY  = C.ground - C.charH*0.92;

  const fs = Math.max(14, H*0.032);
  ctx.save();
  ctx.font=`700 ${fs}px Quicksand, sans-serif`;
  const maxW=Math.min(W*0.36, fs*15);
  const lines=wrapText(taunt.txt, maxW);
  const padX=fs*0.65, padY=fs*0.5, lh=fs*1.18;
  let tw=0; for(const ln of lines) tw=Math.max(tw, ctx.measureText(ln).width);
  const bw=tw+padX*2, bh=lines.length*lh+padY*2;
  let bx=rishiX + C.charH*0.10;
  let by=headY - bh - fs*0.6;
  bx=Math.max(10, Math.min(W-bw-10, bx));
  by=Math.max(8, by);

  ctx.globalAlpha=a;
  const sc=0.82+0.18*k, cxp=bx+bw*0.3, cyp=by+bh;          // pop from near the tail
  ctx.translate(cxp,cyp); ctx.scale(sc,sc); ctx.translate(-cxp,-cyp);

  // bubble body + tail
  const tailX=Math.max(bx+fs*0.9, Math.min(bx+bw-fs*0.9, rishiX+C.charH*0.06));
  ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=18; ctx.shadowOffsetY=5;
  roundRect(bx,by,bw,bh,fs*0.7); ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(tailX-fs*0.5, by+bh-2);
  ctx.lineTo(tailX+fs*0.05, by+bh+fs*0.95);
  ctx.lineTo(tailX+fs*0.55, by+bh-2);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // edge: red neon for Rishi's menace, hopeful violet for the way-out callout
  roundRect(bx,by,bw,bh,fs*0.7);
  ctx.lineWidth=Math.max(2.5,fs*0.11);
  if(taunt.friendly){
    ctx.strokeStyle='#8b6bff'; ctx.shadowColor='rgba(139,107,255,.75)';
  } else {
    ctx.strokeStyle='#ff3344'; ctx.shadowColor='rgba(255,50,70,.7)';
  }
  ctx.shadowBlur=10; ctx.stroke(); ctx.shadowBlur=0;

  // text
  ctx.fillStyle='#1a0a12'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<lines.length;i++) ctx.fillText(lines[i], bx+bw/2, by+padY+lh*(i+0.5));
  ctx.restore();
}

function chaseX(){
  // 1 = bar full (clean): Rishi parked at the back, fully on screen.
  // 0 = bar empty: Rishi right on Schmoo's tail.
  const frac = Math.max(0, Math.min(1, (gojoGap-C.gapCatch)/(C.gapMax-C.gapCatch)));
  const backX = Math.max(C.charH*0.46, W*0.05);     // hugs left edge, never cut off
  let   nearX = C.schmooX - C.charH*0.35;            // looming right behind Schmoo
  nearX = Math.max(nearX, backX + C.charH*0.5);      // keep ordering on any aspect
  return backX + (nearX-backX)*(1-frac);
}
function drawSkyFlash(){

const BW_BG='#e7e5e0', BW_INK='#3a3a3a', BW_LINE='#2b2b2b';
let bwClouds=null, bwBumps=null;

/* ===========================================================================
   Level 2 — "THE MATRIX BLEEDS THROUGH"
   ---------------------------------------------------------------------------
   A black, glitchy code-rain world that tears IN over the white Dino world in
   bursts and escalates as the escape clock runs down — peaking into a near-
   total takeover right at the exit. Built from: green digital rain (rendered
   to an offscreen buffer), additive RGB-split chromatic aberration, hard
   horizontal tear-slices, datamosh blocks, glitch-text fragments, CRT
   scanlines + a rolling scan-bar, channel flashes and a vignette.

   `corrupt` (0..1) is the master "how much has the Matrix taken over" value.
   It rides a faint decay-based baseline, spikes during scheduled bursts, and
   is pinned high through the escape telegraph/vortex. Everything is cosmetic,
   draws only shapes/own-canvas (never reads main-canvas pixels, so no taint),
   and uses Math.random() — never the seeded rng() the world gen relies on —
   so deterministic replays are unaffected. Honours prefers-reduced-motion. */
const REDUCED_MOTION = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);

/* offscreen code-rain buffer (+ scratch buffer used for tinted RGB ghosts) */
let mxC=null, mxX=null, scrC=null, scrX=null, mxW=0, mxH=0, mxFont=0, mxCols=[];
const MX_CHARS='0123456789ABCDEF<>/\\|=+*#$%&ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾅﾆﾇﾉﾊﾋﾌﾍﾎ';
function mxPick(){ return MX_CHARS[(Math.random()*MX_CHARS.length)|0]; }
function ensureMatrix(){
  if(mxC && mxW===Math.round(W) && mxH===Math.round(H)) return;
  mxW=Math.round(W); mxH=Math.round(H);
  if(!mxC){ mxC=document.createElement('canvas'); mxX=mxC.getContext('2d'); }
  if(!scrC){ scrC=document.createElement('canvas'); scrX=scrC.getContext('2d'); }
  mxC.width=scrC.width=mxW; mxC.height=scrC.height=mxH;
  mxFont=Math.max(13, Math.round(H*0.022));
  const colW=mxFont*0.72, n=Math.ceil(mxW/colW);
  mxCols=[];
  for(let i=0;i<n;i++) mxCols.push({
    x:i*colW, y:-Math.random()*mxH/mxFont, sp:6+Math.random()*16, ch:mxPick(), py:null, pch:null });
  mxX.fillStyle='#020a05'; mxX.fillRect(0,0,mxW,mxH);
}
function matrixStep(dt, speedMul){
  ensureMatrix();
  // fade prior frame toward black-green -> trails
  mxX.globalCompositeOperation='source-over';
  mxX.fillStyle='rgba(2,10,5,0.16)'; mxX.fillRect(0,0,mxW,mxH);
  mxX.font=`${mxFont}px "Courier New",monospace`; mxX.textBaseline='top';
  for(const c of mxCols){
    const row=Math.floor(c.y);
    if(c.py!=null && c.py!==row){            // demote the old leading char to green so only the tip is bright
      mxX.fillStyle='#27e652'; mxX.fillText(c.pch, c.x, c.py*mxFont);
    }
    if(row>=0 && row*mxFont<mxH){            // bright mint leading char
      mxX.fillStyle='#d8ffe2'; mxX.fillText(c.ch, c.x, row*mxFont);
    }
    c.py=row; c.pch=c.ch;
    if(Math.random()<0.08) c.ch=mxPick();    // flicker the glyph
    c.y += c.sp*dt*speedMul;
    if(row*mxFont>mxH && Math.random()<0.06){ c.y=-Math.random()*6; c.py=null; c.sp=6+Math.random()*16; }
  }
}
/* draw the rain buffer tinted to one RGB channel, shifted by `ox`, added on top */
function tintBlit(rgb, ox, alpha){
  if(alpha<=0.01) return;
  scrX.globalCompositeOperation='source-over'; scrX.clearRect(0,0,mxW,mxH);
  scrX.drawImage(mxC,0,0);
  scrX.globalCompositeOperation='source-in'; scrX.fillStyle=rgb; scrX.fillRect(0,0,mxW,mxH);
  scrX.globalCompositeOperation='source-over';
  ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=alpha;
  ctx.drawImage(scrC, ox, 0, W, H);
}

let corrupt=0;                               // 0..1 master takeover amount
function glitchReset(){ corrupt=0; corruptNext=1.2+Math.random()*2.5; corruptOn=false; corruptT=0; }
let corruptNext=2, corruptOn=false, corruptT=0, corruptDur=0;
function updateCorruption(dt){
  if(REDUCED_MOTION || level!==2 || state!=='playing'){ corrupt=0; return; }
  const decay=Math.min(1, elapsed/LEVEL_TIME);          // 0 early -> 1 at the exit
  // burst scheduler: gaps shrink, bursts lengthen as the clock runs down
  if(corruptOn){
    corruptT+=dt;
    if(corruptT>=corruptDur){ corruptOn=false; corruptNext=(1.7+Math.random()*3.4)*(1-decay*0.72); }
  } else {
    corruptNext-=dt;
    if(corruptNext<=0){ corruptOn=true; corruptT=0; corruptDur=0.16+Math.random()*0.42+decay*0.7; }
  }
  // baseline hum grows late; escape phase pins it near-total (lane is clear then)
  let baseline=decay*decay*0.18;
  if(escapePhase==='telegraph') baseline=0.62;
  else if(escapePhase==='vortex') baseline=0.85;
  const peak=0.66+decay*0.34;
  const target=Math.max(baseline, corruptOn?peak:baseline);
  // snappy attack / quick release = stuttery "glitch in & out"
  const rate=(target>corrupt)?30:14;
  corrupt += (target-corrupt)*Math.min(1, rate*dt);
  if(corrupt<0.004) corrupt=0;
  if(corrupt>0) matrixStep(dt, 1+decay*1.6+(corruptOn?1.2:0));
}
function drawMatrixGlitch(t){
  if(REDUCED_MOTION || level!==2 || state!=='playing' || corrupt<=0) return;
  ensureMatrix();
  const c=corrupt;
  if(corruptOn && Math.random()<0.12) return;            // dropped frames during a burst -> stutter
  const cap=(escapePhase==='none')?0.52:1.0;             // keep it playable mid-level; full takeover only at the exit
  const wash=Math.min(cap, c);
  const dx=(2+c*11)*(0.5+Math.random()*0.6);             // chromatic offset, jittered
  ctx.save();
  // 1) black it out where the Matrix shows, then add green rain
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=wash*0.97; ctx.fillStyle='#03100a'; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=wash; ctx.drawImage(mxC,0,0,W,H);
  // 2) RGB-split chromatic ghosts (grow with corruption)
  if(c>0.12){
    tintBlit('rgb(255,40,70)',  dx, wash*0.55*c);
    tintBlit('rgb(60,90,255)', -dx, wash*0.55*c);
  }
  // 3) hard tear-slices that snap the worlds against each other
  const slices=Math.round(2+c*9);
  for(let i=0;i<slices;i++){
    const h=(7+Math.random()*(50+c*70))|0, y=(Math.random()*H)|0, ox=(Math.random()-0.5)*(12+c*70);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.9;
    ctx.fillStyle='#02110b'; ctx.fillRect(0,y,W,h);
    ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.95;
    ctx.drawImage(mxC, 0, Math.max(0,Math.min(mxH-h,y)), mxW, h, ox, y, W, h);
    ctx.fillStyle='rgba(255,40,70,.55)';  ctx.fillRect(ox-2, y, W, 1.5);
    ctx.fillStyle='rgba(60,140,255,.55)'; ctx.fillRect(ox+2, y+h-1.5, W, 1.5);
  }
  // 4) datamosh blocks (chunks of rain slammed elsewhere) + glitch-text
  if(c>0.2){
    const blocks=Math.round(c*6*Math.random());
    for(let i=0;i<blocks;i++){
      const bw=18+Math.random()*180, bh=8+Math.random()*44;
      const sx=Math.random()*Math.max(1,mxW-bw), sy=Math.random()*Math.max(1,mxH-bh);
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.4+0.45*Math.random();
      ctx.drawImage(mxC, sx,sy,bw,bh, Math.random()*W, Math.random()*H, bw,bh);
    }
    if(Math.random()<0.5*c){
      ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=0.85;
      ctx.fillStyle='rgba(190,255,205,.92)'; ctx.font=`bold ${Math.round(14+Math.random()*22)}px monospace`;
      let s=''; const L=3+(Math.random()*7|0); for(let k=0;k<L;k++) s+=mxPick();
      ctx.fillText(s, Math.random()*W*0.82, Math.random()*H);
    }
  }
  // 5) occasional full-frame channel flash
  if(Math.random()<0.07*c){
    ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.06+0.12*Math.random();
    ctx.fillStyle='rgb(120,255,170)'; ctx.fillRect(0,0,W,H);
  }
  // 6) CRT scanlines + a rolling scan bar
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=0.10+0.14*wash; ctx.fillStyle='#000';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1.5);
  const by=((t*70)% (H+140))-70;
  const sg=ctx.createLinearGradient(0,by-70,0,by+70);
  sg.addColorStop(0,'rgba(130,255,170,0)'); sg.addColorStop(.5,`rgba(130,255,170,${0.05+0.09*wash})`); sg.addColorStop(1,'rgba(130,255,170,0)');
  ctx.globalAlpha=1; ctx.fillStyle=sg; ctx.fillRect(0,by-70,W,140);
  // 7) vignette
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.18, W/2,H/2,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,`rgba(0,5,2,${0.22+0.45*c})`);
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  ctx.restore();
}
function drawCloud(cx,cy,s){
  ctx.beginPath();
  ctx.arc(cx,        cy, 13*s, Math.PI*0.5, Math.PI*1.5);
  ctx.arc(cx+14*s, cy-9*s, 12*s, Math.PI, Math.PI*2);
  ctx.arc(cx+30*s, cy-6*s, 14*s, Math.PI*1.1, Math.PI*2);
  ctx.arc(cx+44*s, cy, 11*s, Math.PI*1.5, Math.PI*0.5);
  ctx.closePath();
}
function drawBackgroundBW(t){
  if(!bwClouds) bwBuild();
  ctx.fillStyle=BW_BG; ctx.fillRect(0,0,W,H);
  // drifting clouds (slow parallax, line-art)
  ctx.save();
  ctx.strokeStyle='#c8c8c8'; ctx.lineWidth=3; ctx.lineJoin='round';
  for(const c of bwClouds){
    let x=((c.x*W - scrollX*c.sp)%(W*1.3)+W*1.3)%(W*1.3) - W*0.15;
    drawCloud(x, c.y*H, c.s); ctx.stroke();
  }
  ctx.restore();
  // ground line
  ctx.strokeStyle=BW_LINE; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,C.ground); ctx.lineTo(W,C.ground); ctx.stroke();
  // scrolling ground texture: little dashes + pebbles below the line (classic Dino floor)
  ctx.save(); ctx.strokeStyle='#9a9a9a'; ctx.fillStyle='#9a9a9a'; ctx.lineWidth=2;
  const span=H-C.ground;
  for(const b of bwBumps){
    let x=((b.x*W - scrollX)%W+W)%W;
    const y=C.ground + 6 + b.y*Math.min(span-8, H*0.10);
    if(b.len>7){ ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+b.len,y); ctx.stroke(); }
    else { ctx.fillRect(x,y,2,2); }
  }
  ctx.restore();
}
function drawCreditBW(cr,t){
  const R=cr.r*(1+Math.sin(cr.t*3.0)*0.06);
  ctx.save(); ctx.translate(cr.x,cr.y); ctx.rotate(Math.sin(cr.t*1.3)*0.18);
  ctx.shadowBlur=0;
  // coin: white fill, dark ring
  ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.arc(0,0,R,0,6.283); ctx.fill();
  ctx.lineWidth=Math.max(2,R*0.16); ctx.strokeStyle=BW_INK;
  ctx.beginPath(); ctx.arc(0,0,R,0,6.283); ctx.stroke();
  // little star in the middle
  ctx.fillStyle=BW_INK; sparklePath(0,0,R*0.5,0.42); ctx.fill();
  ctx.restore();
}
function drawBonusBW(b,t){
  ctx.save();
  ctx.translate(b.x, b.y + Math.sin(b.t*2.2)*4);
  const s=C.charH*0.60;
  ctx.lineJoin='round'; ctx.lineWidth=Math.max(2.5,s*0.05);
  ctx.strokeStyle=BW_INK; ctx.fillStyle='#ffffff'; ctx.shadowBlur=0;
  if(b.type==='rocket'){
    ctx.rotate(-0.14+Math.sin(b.t*3)*0.05);
    // flame (outline)
    const fl=0.5+0.5*Math.abs(Math.sin(b.t*22));
    ctx.beginPath(); ctx.moveTo(-s*0.10,s*0.40); ctx.quadraticCurveTo(0,s*(0.58+0.22*fl),s*0.10,s*0.40); ctx.closePath();
    ctx.fillStyle=BW_INK; ctx.fill(); ctx.fillStyle='#ffffff';
    // body
    ctx.beginPath(); ctx.moveTo(0,-s*0.5);
    ctx.quadraticCurveTo(s*0.18,-s*0.28,s*0.18,0); ctx.lineTo(s*0.18,s*0.34);
    ctx.quadraticCurveTo(0,s*0.48,-s*0.18,s*0.34); ctx.lineTo(-s*0.18,0);
    ctx.quadraticCurveTo(-s*0.18,-s*0.28,0,-s*0.5); ctx.closePath(); ctx.fill(); ctx.stroke();
    // fins
    ctx.beginPath(); ctx.moveTo(-s*0.16,s*0.12); ctx.lineTo(-s*0.32,s*0.42); ctx.lineTo(-s*0.16,s*0.36); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.16,s*0.12); ctx.lineTo(s*0.32,s*0.42); ctx.lineTo(s*0.16,s*0.36); ctx.closePath(); ctx.fill(); ctx.stroke();
    // window
    ctx.beginPath(); ctx.arc(0,-s*0.02,s*0.09,0,6.283); ctx.fillStyle=BW_INK; ctx.fill();
  } else {
    ctx.rotate(Math.sin(b.t*2)*0.05);
    const topY=-s*0.30, half=s*0.40, apex=s*0.54;
    // slice
    ctx.beginPath(); ctx.moveTo(-half,topY); ctx.quadraticCurveTo(0,topY+s*0.06,half,topY); ctx.lineTo(0,apex); ctx.closePath();
    ctx.fillStyle='#ffffff'; ctx.fill(); ctx.stroke();
    // crust band
    ctx.beginPath(); ctx.moveTo(-half,topY); ctx.quadraticCurveTo(0,topY-s*0.14,half,topY); ctx.stroke();
    // pepperoni (filled dark dots)
    ctx.fillStyle=BW_INK;
    for(const p of [[-0.13,-0.08,0.07],[0.13,-0.04,0.06],[-0.02,0.10,0.06]]){
      ctx.beginPath(); ctx.arc(s*p[0],s*p[1],s*p[2],0,6.283); ctx.fill();
    }
  }
  ctx.restore();
}
function drawErrorSignBW(x,y,w,h){
  const r=Math.max(3,h*0.10);
  ctx.lineJoin='round'; ctx.shadowBlur=0;
  // plate
  roundRect(x,y,w,h,r); ctx.fillStyle='#ffffff'; ctx.fill();
  roundRect(x,y,w,h,r); ctx.lineWidth=Math.max(3,h*0.06); ctx.strokeStyle=BW_LINE; ctx.stroke();
  // warning triangle (left)
  const gcx=x+h*0.62, gcy=y+h*0.52, gr=h*0.30;
  ctx.beginPath(); ctx.moveTo(gcx,gcy-gr); ctx.lineTo(gcx+gr*0.95,gcy+gr*0.72); ctx.lineTo(gcx-gr*0.95,gcy+gr*0.72); ctx.closePath();
  ctx.lineWidth=Math.max(2,h*0.05); ctx.strokeStyle=BW_LINE; ctx.stroke();
  ctx.fillStyle=BW_LINE; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`900 ${h*0.30}px Orbitron, sans-serif`; ctx.fillText('!',gcx,gcy+gr*0.18);
  // text
  const tx=x+h*1.12, avail=(x+w)-tx-h*0.20;
  ctx.textAlign='left';
  const p1=fitFont('900',h*0.40,'Orbitron, sans-serif','ERROR 500',avail);
  ctx.font=`900 ${p1}px Orbitron, sans-serif`; ctx.fillStyle=BW_LINE;
  ctx.fillText('ERROR 500',tx,y+h*0.38);

  ctx.font=`700 ${p2}px Quicksand, sans-serif`; ctx.fillStyle='#6a6a6a';
  ctx.fillText('generation failed',tx,y+h*0.72);
}
function drawObstacleBW(o,t){
  ctx.save(); ctx.shadowBlur=0;
  if(o.type==='low'){
    // "404 NOT FOUND" block sitting on the ground — jump it. Visual == hitbox (fair).
    const b=obstacleBox(o);
    const bx=b.x, by=b.y, bw=b.w, bh=b.h;
    roundRect(bx,by,bw,bh,Math.max(3,bh*0.10)); ctx.fillStyle='#ffffff'; ctx.fill();
    roundRect(bx,by,bw,bh,Math.max(3,bh*0.10)); ctx.lineWidth=Math.max(3,bh*0.10); ctx.strokeStyle=BW_LINE; ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=BW_LINE;
    const p1=fitFont('900',bh*0.46,'Orbitron, sans-serif','404',bw*0.82);
    ctx.font=`900 ${p1}px Orbitron, sans-serif`; ctx.fillText('404',bx+bw/2,by+bh*0.40);
    const p2=fitFont('700',bh*0.18,'Quicksand, sans-serif','NOT FOUND',bw*0.86);
    ctx.font=`700 ${p2}px Quicksand, sans-serif`; ctx.fillStyle='#6a6a6a';
    ctx.fillText('NOT FOUND',bx+bw/2,by+bh*0.76);
  } else {
    // hanging "generation failed" sign — duck under it
    const gy=C.ground - o.gap, w=o.w;
    const bw=w*1.6, bx=o.x+w/2-bw/2, sh=bw*0.34;
    const sy=gy-sh, atop=sy+sh*0.10;
    const ax1=bx+bw*0.16, ax2=bx+bw*0.84;
    const sway=Math.sin(t*1.5+o.x*0.012)*0.035, pivX=(ax1+ax2)/2;
    ctx.save(); ctx.translate(pivX,0); ctx.rotate(sway); ctx.translate(-pivX,0);
    ctx.strokeStyle=BW_INK; ctx.lineWidth=Math.max(2,bw*0.012);
    ctx.beginPath(); ctx.moveTo(ax1,0); ctx.lineTo(ax1,atop); ctx.moveTo(ax2,0); ctx.lineTo(ax2,atop); ctx.stroke();
    drawErrorSignBW(bx,sy,bw,sh);
    ctx.restore();
    // duck-gap guide line
    ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle='#b0b0b0'; ctx.lineWidth=2;
    ctx.setLineDash([6,10]); ctx.lineDashOffset=-scrollX*0.5;
    ctx.beginPath(); ctx.moveTo(o.x-w*0.05,gy); ctx.lineTo(o.x+w*1.05,gy); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function render(t){
  ctx.clearRect(0,0,W,H);
  if(state==='transition'){ drawTransition(t); return; }
  if(level===3){ render3(t); return; }
  ctx.save();
  if(shake>0.4){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }
  drawBackground(t);
  for(const o of obstacles) drawObstacle(o,t);
  drawCredits(t);
  if(bonus) drawBonus(bonus,t);
  drawCharacters();
  drawVortex(t);
  drawSparks();
  drawFloaters();
  drawTaunt();
  ctx.restore();
  drawSkyFlash();

  if(flash>0.02){ ctx.fillStyle=`rgba(255,60,90,${flash*0.30})`; ctx.fillRect(0,0,W,H); }
  drawMatrixGlitch(t);

  // HUD updates
  document.getElementById('score').firstChild.nodeValue = String(score);
  // countdown to the way-out
  const timerEl=document.getElementById('timer');
  if(timerEl){
    if(state!=='playing'){
      timerEl.style.display='none';
    } else {
      timerEl.style.display='';
      const small=timerEl.querySelector('small');
      if(escapePhase==='none'){
        const remain=Math.max(0, LEVEL_TIME-elapsed);
        const mm=Math.floor(remain/60), ss=Math.floor(remain%60);
        timerEl.firstChild.nodeValue = mm+':'+String(ss).padStart(2,'0');
        timerEl.classList.toggle('urgent', remain<=10);
        if(small) small.textContent='WAY OUT IN';
      } else {
        timerEl.firstChild.nodeValue = escapePhase==='vortex' ? 'JUMP!' : 'GET READY';
        timerEl.classList.add('urgent');
        if(small) small.textContent='THE WAY OUT';
      }
    }
  }
  const credEl=document.getElementById('creds');
  if(credEl){
    credEl.querySelector('.cnum').textContent = String(creditsTotal);
    const mulEl=credEl.querySelector('.cmul');
    mulEl.textContent = '×'+creditMult;
    credEl.classList.toggle('show-mul', creditMult>1);
  }
  const frac = Math.max(0, Math.min(1, (gojoGap-C.gapCatch)/(C.gapMax-C.gapCatch)));
  const fill=document.getElementById('fill');
  fill.style.width=(frac*100).toFixed(1)+'%';
  fill.style.filter = frac<0.28 ? 'drop-shadow(0 0 8px #ff3d5d)' : 'none';
  const dt=document.getElementById('dtxt');
  dt.textContent = state!=='playing' ? '—' : frac<0.28?'CLOSE!':frac<0.6?'gaining':'safe';
  dt.style.color = frac<0.28 ? '#ff7088' : 'var(--mist)';
}

/* ============================  LOOP  ============================ */
let last=0;
function loop(ts){
  const t=ts/1000; let dt=(ts-last)/1000; last=ts;
  if(dt>0.05) dt=0.05;
  // Never run the sim/render with a degenerate canvas — re-measure and skip.
  if(!(W>0) || !(H>0)){ resize(); requestAnimationFrame(loop); return; }
  update(dt); render(t);
  requestAnimationFrame(loop);
}
