/* ===========================================================================
   LEVEL 2 -> 3 INTERACTIVE TRANSITION  ("ride the error into cyberspace")
   ---------------------------------------------------------------------------
   Not a level. After Schmoo escapes the B&W server world we cut to an empty
   black "matrix" void (calm slow code-rain, NO glitch). Schmoo — his original
   COLOURFUL self — stands alone; on a tap he walks over, hops onto a red
   "generation fail" board, morphs into his cyber-surfer form (the supplied
   art) and rides off-screen toward level 3. Interactive: tap to begin, tap to
   advance/skip. Bridges onward via finishTransition() — see the LEVEL 3 HOOK. */
let tr=null;
function startTransition(){
  state='transition';
  stopMusic();
  document.body.classList.remove('lvl2');               // Schmoo's colour skin + neutral chrome
  const hud=document.getElementById('hud'); if(hud) hud.style.display='none';
  overlay.className='hide';                              // pure canvas scene; prompt drawn on-canvas
  submitScore('player', score, null);                   // (showWin used to submit; preserve it)
  const bh=C.charH*0.30, bcx=W*0.52;
  tr={ phase:'idle', t:0,
       sx:W*0.14, feet:C.ground, runF:0, runT:0, jumpF:0,
       bcx, bw:C.charH*1.6, bh, boardTop:C.ground-bh, standX:bcx,
       hopT:0, hopDur:0.52, poseT:0, morphT:0, flash:0, surfA:0,
       flyT:0, sparks:[], promptA:0 };
}
function trSpawnSparks(){
  for(let i=0;i<36;i++){ const a=Math.random()*6.283, sp=120+Math.random()*360;
    tr.sparks.push({x:tr.bcx, y:tr.boardTop-C.charH*0.5, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-90,
                    life:0.5+Math.random()*0.5, t:0, r:2+Math.random()*2.5}); }
}
function trAdvance(){
  if(!tr) return;
  if(tr.phase==='idle'){ tr.phase='walk'; return; }     // tap to begin
  if(tr.phase==='fly'){ finishTransition(); return; }   // tap to finish
  tr.sx=tr.standX; tr.feet=tr.boardTop; tr.surfA=1; tr.flash=0; tr.phase='fly'; tr.flyT=0;  // skip to the ride-off
}
function updateTransition(dt){
  if(!tr) return;
  tr.t+=dt;
  if(!REDUCED_MOTION) matrixStep(dt, 0.5);              // calm slow rain for ambiance
  for(const s of tr.sparks){ s.t+=dt; s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=520*dt; }
  if(tr.sparks.length) tr.sparks=tr.sparks.filter(s=>s.t<s.life);
  switch(tr.phase){
    case 'idle': tr.promptA=0.45+0.55*Math.sin(tr.t*3.2); break;
    case 'walk': {
      const vx=(tr.standX-W*0.14)/1.4; tr.sx+=vx*dt; tr.feet=C.ground;
      tr.runT+=dt; if(tr.runT>=0.07){ tr.runT=0; tr.runF=(tr.runF+1)%MANIFEST['schmooRun'].frames; }
      if(tr.sx>=tr.standX){ tr.sx=tr.standX; tr.phase='mount'; tr.hopT=0; tr.jumpF=0; }
      break; }
    case 'mount': {
      tr.hopT+=dt; const p=Math.min(1,tr.hopT/tr.hopDur);
      tr.feet=(C.ground+(tr.boardTop-C.ground)*p)-Math.sin(p*Math.PI)*C.charH*0.42;   // hop arc onto the deck
      tr.jumpF=Math.min(MANIFEST['schmooJump'].frames-1, Math.floor(p*MANIFEST['schmooJump'].frames));
      if(p>=1){ tr.feet=tr.boardTop; tr.phase='pose'; tr.poseT=0; }
      break; }
    case 'pose': tr.poseT+=dt; if(tr.poseT>=0.5){ tr.phase='morph'; tr.morphT=0; trSpawnSparks(); } break;
    case 'morph':
      tr.morphT+=dt;
      tr.flash=Math.sin(Math.min(1,tr.morphT/0.45)*Math.PI);             // flash up then down
      tr.surfA=Math.max(0,Math.min(1,(tr.morphT-0.16)/0.2));             // surfer fades in
      if(tr.morphT>=0.5){ tr.surfA=1; tr.phase='fly'; tr.flyT=0; }
      break;
    case 'fly': tr.flyT+=dt; if(tr.flyT>=1.6) finishTransition(); break;
  }
}
function finishTransition(){
  tr=null;
  /* The cyber-surf bridge now lands in the finale. */
  gotoLevel(3);
}
function drawGenBoard(cx, groundY, w, h){
  const x=cx-w/2, y=groundY-h, r=h*0.22;
  ctx.save(); ctx.shadowBlur=0;
  roundRect(x,y,w,h,r);
  const g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,'#e83c3c'); g.addColorStop(1,'#b01d22');
  ctx.fillStyle=g; ctx.fill();
  roundRect(x,y,w,h,r); ctx.lineWidth=Math.max(2,h*0.08); ctx.strokeStyle='#7c1417'; ctx.stroke();
  const cs=h*0.72, cxx=x+h*0.30, cyy=y+(h-cs)/2;       // X chevron cell (left)
  roundRect(cxx,cyy,cs,cs,cs*0.2); ctx.fillStyle='#f3e6c8'; ctx.fill();
  ctx.strokeStyle='#c0322f'; ctx.lineWidth=Math.max(3,cs*0.16); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cxx+cs*0.28,cyy+cs*0.28); ctx.lineTo(cxx+cs*0.72,cyy+cs*0.72);
  ctx.moveTo(cxx+cs*0.72,cyy+cs*0.28); ctx.lineTo(cxx+cs*0.28,cyy+cs*0.72); ctx.stroke();
  ctx.fillStyle='#f3e6c8'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font=`700 ${h*0.44}px "Courier New", monospace`;
  ctx.fillText('generation fail', cxx+cs+h*0.22, y+h*0.55);
  ctx.restore();
}
function drawTransition(t){
  if(!tr){ ctx.fillStyle='#02060b'; ctx.fillRect(0,0,W,H); return; }  // finished mid-frame; paint the void until the menu shows
  // --- empty black "matrix" void ---
  ctx.fillStyle='#02060b'; ctx.fillRect(0,0,W,H);
  if(!REDUCED_MOTION && mxC){
    ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.20; ctx.drawImage(mxC,0,0,W,H);
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  }
  const vg=ctx.createRadialGradient(W/2,C.ground*0.9,Math.min(W,H)*0.12, W/2,C.ground*0.9,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,3,1,0.6)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(60,255,130,0.10)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,C.ground); ctx.lineTo(W,C.ground); ctx.stroke();

  const surfShown=(tr.phase==='morph' && tr.surfA>0) || tr.phase==='fly';

  // --- red "generation fail" board on the ground ---
  if(tr.phase!=='fly') drawGenBoard(tr.bcx, C.ground, tr.bw, tr.bh);

  // --- Schmoo (colourful), until he morphs ---
  if(tr.phase==='idle')       drawSprite('schmooRun', 0, tr.sx, tr.feet, C.charH*0.92);
  else if(tr.phase==='walk')  drawSprite('schmooRun', tr.runF, tr.sx, tr.feet, C.charH*0.92);
  else if(tr.phase==='mount') drawSprite('schmooJump', tr.jumpF, tr.standX, tr.feet, C.charH);
  else if(tr.phase==='pose')  drawSprite('schmooRun', 0, tr.standX, tr.boardTop, C.charH*0.92);
  else if(tr.phase==='morph' && tr.surfA<0.95){
    ctx.save(); ctx.globalAlpha=1-tr.surfA; drawSprite('schmooRun',0,tr.standX,tr.boardTop,C.charH*0.92); ctx.restore();
  }

  // --- morph flash ---
  if(tr.flash>0.01){
    const fx=tr.bcx, fy=tr.boardTop-C.charH*0.5, R=C.charH*(0.6+tr.flash*1.5);
    const fg=ctx.createRadialGradient(fx,fy,0, fx,fy,R);
    fg.addColorStop(0,`rgba(225,255,238,${0.9*tr.flash})`);
    fg.addColorStop(0.5,`rgba(90,255,150,${0.5*tr.flash})`);
    fg.addColorStop(1,'rgba(90,255,150,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
  }

  // --- sparks ---
  for(const s of tr.sparks){ const a=Math.max(0,1-s.t/s.life); ctx.globalAlpha=a;
    ctx.fillStyle=a>0.5?'#eaffee':'#46ff7a'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.283); ctx.fill(); }
  ctx.globalAlpha=1;

  // --- the cyber-surfer art: morph in, then ride off into cyberspace ---
  const img=sprites.schmooSurf;
  if(surfShown && img && img.complete && img.naturalWidth){
    const ar=img.naturalWidth/img.naturalHeight, baseH=C.charH*1.85, baseW=baseH*ar;
    let cx=tr.bcx, cyB=C.ground, scale=1, alpha=tr.surfA;
    if(tr.phase==='fly'){
      const e=tr.flyT;
      cx  = tr.bcx + (W*0.62)*(e*e);
      cyB = C.ground - (H*1.08)*(e*e);
      scale = Math.max(0.42, 1-e*0.45);
      alpha = Math.max(0, 1-Math.max(0,e-1.0)*1.9);
      for(let i=1;i<=3;i++){                                   // speed-trail afterimages
        const e2=Math.max(0,e-i*0.05);
        const tx=tr.bcx+(W*0.62)*(e2*e2), tyB=C.ground-(H*1.08)*(e2*e2), ts=Math.max(0.42,1-e2*0.45);
        const tw=baseW*ts, th=baseH*ts;
        ctx.globalAlpha=alpha*0.16/i; ctx.drawImage(img, tx-tw/2, tyB-th, tw, th);
      }
    }
    const w=baseW*scale, h=baseH*scale;
    ctx.globalAlpha=alpha; ctx.drawImage(img, cx-w/2, cyB-h, w, h); ctx.globalAlpha=1;
  }

  // --- idle prompt ---
  if(tr.phase==='idle'){
    ctx.save(); ctx.globalAlpha=tr.promptA; ctx.textAlign='center'; ctx.fillStyle='#bfffce';
    ctx.font=`700 ${Math.max(13,H*0.026)}px Orbitron, sans-serif`;
    ctx.fillText('TAP TO CONTINUE', W/2, C.ground+H*0.085);
    ctx.restore();
  }
}

/* ===== LEVEL 3: CYBERSPACE FLIGHT FINALE ===== */
/* ===========================================================================
   LEVEL 3 — "SCHMOO'S ALMOST FREE"  (endless cyberspace flight finale)
   ---------------------------------------------------------------------------
   A flappy-bird-without-pipes flight runner. Schmoo flies his escape rocket;
   the player steers him UP/DOWN only (hold + drag on touch, ▲/▼ on keys) to
   weave through red ERROR blocks. No timer, no exit, no collectible credits —
   it just gets faster forever until it's impossible. Rishi chases from behind,
   sporadically diving off-screen and zooming back up. Hits cost a big chunk of
   the distance bar (two back-to-back = caught). On death, 500 BANKED credits
   (rolled over from earlier levels) buys a reroll/extra life via the purple
   two-arrows button. The Rishi-catch animation is a later pass.
   Background: black + subtle green matrix + a synthwave cyberspace tunnel.
   All cosmetic FX are shape-based and honour prefers-reduced-motion. ======= */

const ERR_LABELS = ['ERROR','404','500','FATAL','NaN','NULL','PANIC','0xDEAD','TIMEOUT','STACK'];
const REROLL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 4v4h-4"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 20v-4h4"/></svg>';
let streaks3=null, bg3LastT=0, lastGauntlet=-99;

function computeConfig3(){
  C3.flyH    = H*0.20;                       // drawn sprite height
  C3.top     = H*0.12 + C3.flyH*0.5;         // playfield clamp (sprite centre)
  C3.bot     = H*0.92 - C3.flyH*0.5;
  C3.schmooX = W*0.30;
  C3.speed0    = Math.max(W*0.52, 410);
  C3.speedRamp = Math.max(W*0.045, 32);      // gradual, forever-climbing speed
  C3.followK   = 14;                         // touch spring toward finger
  C3.keyV      = H*1.05;                      // keyboard vertical speed
  C3.gapMax = W*0.42; C3.gapCatch = W*0.045; C3.gapStart = C3.gapMax;
  C3.hitPenalty = (C3.gapMax-C3.gapCatch)*0.42;   // ~3 hits back-to-back to be caught
  C3.recover    = W*0.085;                    // bar refill/sec when clean
  C3.driftK     = C3.recover/(W*2.2);         // gentler passive drain
  // ---- error field: forgiving early, gradually busier ----
  C3.errUnit   = H*0.135;                     // base block size unit
  C3.gapFlyMax = C3.flyH*3.0;                 // very open single-path gap (early)
  C3.gapFlyMin = C3.flyH*1.70;                // still comfortably flyable (late)
  C3.diffRamp  = 120;                         // seconds to approach max chaos (slower)
}
function clampFlyY(y){ return Math.max(C3.top, Math.min(C3.bot, y)); }

function initLevel3(){
  computeConfig3();
  elapsed=0; score=0; distAcc=0; speed=C3.speed0;
  fly={ y:(C3.top+C3.bot)/2, targetY:(C3.top+C3.bot)/2, vy:0, pitch:0, thrust:0, touching:false, dispY:null };
  errs=[]; spawnTimer3=0.8; invuln3=0.9; lastGauntlet=-99;
  gojoGap=C3.gapStart;
  rishi3={ y:(C3.top+C3.bot)/2, vy:0, surge:0, bob:rng()*6.28 };
  streaks3=null; bg3=0;
  keys3.up=false; keys3.down=false; ptrActive=false;
}

function errInterval(){
  const d = Math.min(1, elapsed/C3.diffRamp);
  const base = 1.10 - d*0.55;                 // ~1.1s -> ~0.55s between waves
  return Math.max(0.45, base*(0.8+rng()*0.45));
}
function spawnError3(){
  const d = Math.min(1, elapsed/C3.diffRamp);
  const X = W + 40;
  const r = rng();
  const canGauntlet = (elapsed - lastGauntlet) > (4.2 - d*1.4);   // longer cooldown
  let pat;
  if(d>0.40 && canGauntlet && r < (0.05 + d*0.22))     pat='gauntlet'; // ONE clear path (rarer, later)
  else if(r < 0.26 + d*0.22)                           pat='cluster';  // a couple at once
  else if(r < 0.58)                                    pat='pincer';   // top+bottom, open weave gap
  else                                                 pat='single';

  if(pat==='single'){
    const w=C3.errUnit*(1.0+rng()*0.7), h=C3.errUnit*(0.7+rng()*0.5);
    const y=C3.top - C3.flyH*0.5 + rng()*((C3.bot-C3.top)+C3.flyH - h);
    errAt3(X, y, w, h);
  }
  else if(pat==='cluster'){
    const n = 1 + ((rng()*(1.4+d*1.6))|0);      // 1..~3 scattered popups
    for(let i=0;i<n;i++){
      const w=C3.errUnit*(0.9+rng()*0.7), h=C3.errUnit*(0.6+rng()*0.6);
      const y=C3.top - C3.flyH*0.5 + rng()*((C3.bot-C3.top)+C3.flyH - h);
      errAt3(X + rng()*W*0.12, y, w, h);
    }
  }
  else if(pat==='pincer'){
    const gap = (C3.gapFlyMax + (C3.gapFlyMin-C3.gapFlyMax)*d) * (1.0+rng()*0.25);
    const gy  = C3.top + rng()*(C3.bot-C3.top);
    const gTop = Math.max(0, gy - gap*0.5), gBot = Math.min(H, gy + gap*0.5);
    const w = C3.errUnit*(1.1+rng()*0.4);
    if(gTop > 8)   errAt3(X, 0,    w, gTop);
    if(H-gBot > 8) errAt3(X, gBot, w, H-gBot);
  }
  else { // gauntlet — near-full wall, single (wide) flyable gap
    lastGauntlet = elapsed;
    const gap = (C3.gapFlyMax + (C3.gapFlyMin-C3.gapFlyMax)*d) * (1.0+rng()*0.12);
    const gy  = C3.top + rng()*(C3.bot-C3.top);
    const gTop = Math.max(0, gy - gap*0.5), gBot = Math.min(H, gy + gap*0.5);
    const w = C3.errUnit*(1.15+rng()*0.4);
    fillWall3(X, 0,    gTop, w);
    fillWall3(X, gBot, H,    w);
  }
}
function errAt3(x,y,w,h){
  errs.push({x, y:Math.max(0,Math.min(H-h,y)), w, h, t:rng()*6.28, hit:false, scored:false,
             label:ERR_LABELS[(rng()*ERR_LABELS.length)|0], seed:rng()});
}
function fillWall3(x, y0, y1, w){
  let y=y0;
  while(y1 - y > 8){
    const seg = Math.min(C3.errUnit*(1.1+rng()*0.6), y1-y);
    errAt3(x, y, w, seg);
    y += seg + 2;
  }
}


function flyHitbox(){
  const dw=C3.flyH*0.90, dh=C3.flyH*0.42;
  return {x:C3.schmooX-dw*0.42, y:fly.y-dh*0.5, w:dw, h:dh};   // forgiving body box, nose to the right
}
function errBox(e){ const ix=e.w*0.10, iy=e.h*0.10; return {x:e.x+ix, y:e.y+iy, w:e.w-2*ix, h:e.h-2*iy}; }

function onErrorHit(e){
  gojoGap -= C3.hitPenalty;
  shake=16; flash=1; invuln3=0.9; creditStreak=0;
  errorSound();
  if(navigator.vibrate) navigator.vibrate(45);
  for(let i=0;i<14;i++){ const a=rng()*6.283, sp=80+rng()*220;
    sparks.push({x:e.x+e.w/2, y:e.y+e.h/2, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-30,
                 life:0.35+rng()*0.4, max:0.75, col: rng()<0.5?'#ff6a8a':'#ffd0d6'}); }
  rishi3.surge=1;                              // Rishi lunges forward on a hit
  if(Math.random()<0.6) popTaunt();
}

function updateRishi3(dt){
  const r=rishi3;
  r.surge = Math.max(0, (r.surge||0) - dt*1.2);
  r.bob   = (r.bob||0) + dt*1.8;
  const targetY = clampFlyY(fly.y + Math.sin(r.bob)*H*0.04);
  r.y += (targetY - r.y)*Math.min(1, 3.4*dt);  // always on-screen, chasing from behind
}

function update3(dt){
  if(!fly) return;
  elapsed += dt;
  speed = C3.speed0 + elapsed*C3.speedRamp;          // forever-climbing

  // ---- vertical steering ----
  const prev = (fly.dispY==null) ? fly.y : fly.dispY;
  if(fly.touching){
    fly.y += (fly.targetY - fly.y) * Math.min(1, C3.followK*dt);
    fly.vy = 0;
  } else {
    const dir = (keys3.up?-1:0) + (keys3.down?1:0);
    fly.vy += (dir*C3.keyV - fly.vy) * Math.min(1, 14*dt);
    fly.y  += fly.vy*dt;
    fly.targetY = fly.y;
  }
  fly.y = clampFlyY(fly.y);
  fly.pitch = Math.max(-0.30, Math.min(0.30, (fly.y - prev)/(H*0.05)));
  fly.dispY = fly.y;
  fly.thrust += dt;
  if(invuln3>0) invuln3 -= dt;

  // ---- distance / score (always climbing) ----
  distAcc += speed*dt;
  score = Math.floor(distAcc/(W*0.5));

  // ---- errors ----
  spawnTimer3 -= dt;
  if(spawnTimer3<=0){ spawnError3(); spawnTimer3 = errInterval(); }
  const hb=flyHitbox();
  for(const e of errs){
    e.x -= speed*dt; e.t += dt;
    if(!e.hit && invuln3<=0 && overlap(hb, errBox(e))){ e.hit=true; onErrorHit(e); }
  }
  errs = errs.filter(e=> e.x + e.w > -60);

  // ---- Rishi + chase bar ----
  updateRishi3(dt);
  const drift = speed * C3.driftK;
  gojoGap += (C3.recover - drift)*dt;
  gojoGap = Math.min(C3.gapMax, gojoGap);
  if(gojoGap <= C3.gapCatch){ caught(); return; }

  tickParticles(dt);
  shake*=Math.pow(0.001,dt); if(shake<0.4) shake=0;
  flash*=Math.pow(0.02,dt);
}

/* ----------------------------- RENDER (L3) ----------------------------- */
function drawGrid3(t){
  const hy=H*0.46, vpx=W*0.5;
  ctx.save();
  ctx.lineWidth=1.1;
  const lanes=14;
  for(let i=-lanes;i<=lanes;i++){
    const fx=vpx + (i/lanes)*W*0.95;
    ctx.globalAlpha=0.15; ctx.strokeStyle='rgba(70,255,140,1)';
    ctx.beginPath(); ctx.moveTo(vpx,hy); ctx.lineTo(fx,H); ctx.stroke();
    ctx.globalAlpha=0.07; ctx.strokeStyle='rgba(70,220,255,1)';
    ctx.beginPath(); ctx.moveTo(vpx,hy); ctx.lineTo(fx,0); ctx.stroke();
  }
  const rows=12, phase=(bg3*0.0016)%1;
  for(let r=0;r<rows;r++){
    const d=(r+phase)/rows;
    const yy=hy + (H-hy)*Math.pow(d,2.2), a=0.05+0.16*d;
    ctx.globalAlpha=1; ctx.strokeStyle=`rgba(70,255,140,${a.toFixed(3)})`;
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke();
    const yc=hy - hy*Math.pow(d,2.2), a2=a*0.55;
    ctx.strokeStyle=`rgba(70,220,255,${a2.toFixed(3)})`;
    ctx.beginPath(); ctx.moveTo(0,yc); ctx.lineTo(W,yc); ctx.stroke();
  }
  ctx.restore(); ctx.globalAlpha=1;
}
function drawStreaks3(t,dt){
  if(!streaks3){ streaks3=[]; for(let i=0;i<26;i++)
    streaks3.push({x:Math.random(), y:Math.random(), len:0.04+Math.random()*0.12, dep:0.3+Math.random()*0.7}); }
  const vis=(state==='playing'?speed:C3.speed0*0.6);
  ctx.save(); ctx.globalCompositeOperation='lighter';
  for(const s of streaks3){
    s.x -= (vis*dt/W)*(0.5+s.dep*1.8);
    if(s.x < -s.len){ s.x=1+Math.random()*0.25; s.y=Math.random(); s.len=0.04+Math.random()*0.12; s.dep=0.3+Math.random()*0.7; }
    const yy=s.y*H, a=0.10+s.dep*0.34, wpx=s.len*W, th=1+s.dep*2.2;
    const gg=ctx.createLinearGradient(s.x*W,0,(s.x+s.len)*W,0);
    gg.addColorStop(0,'rgba(120,255,180,0)'); gg.addColorStop(1,`rgba(150,255,200,${a})`);
    ctx.fillStyle=gg; ctx.fillRect(s.x*W, yy, wpx, th);
  }
  ctx.restore();
}
function drawBackground3(t){
  let dt=t-bg3LastT; bg3LastT=t; if(!(dt>0)||dt>0.05) dt=0.016;
  bg3 += (state==='playing'?speed:C3.speed0*0.6)*dt;

  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#01040a'); g.addColorStop(0.5,'#02060d'); g.addColorStop(1,'#010307');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(!REDUCED_MOTION) matrixStep(dt*0.8, 0.7);
  if(mxC){ ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.14; ctx.drawImage(mxC,0,0,W,H); ctx.restore(); }

  drawGrid3(t);
  drawStreaks3(t,dt);

  // horizon core glow
  const hy=H*0.46;
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const cg=ctx.createRadialGradient(W*0.5,hy,0,W*0.5,hy,W*0.55);
  cg.addColorStop(0,'rgba(40,255,140,0.16)'); cg.addColorStop(0.4,'rgba(30,160,120,0.06)'); cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg; ctx.fillRect(0,0,W,H); ctx.restore();

  if(!REDUCED_MOTION){ ctx.globalAlpha=0.05; ctx.fillStyle='#0a3a22';
    for(let yy=0; yy<H; yy+=3) ctx.fillRect(0,yy,W,1); ctx.globalAlpha=1; }

  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2, W/2,H/2,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,2,1,0.7)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}
function drawError3(e,t){
  const {x,y,w,h,label}=e;
  const r=Math.min(11, Math.min(w,h)*0.16);
  ctx.save();
  // window body + drop shadow
  ctx.shadowColor='rgba(0,0,0,0.55)'; ctx.shadowBlur=Math.max(6,w*0.05); ctx.shadowOffsetX=2; ctx.shadowOffsetY=4;
  roundRect(x,y,w,h,r);
  const bg=ctx.createLinearGradient(0,y,0,y+h);
  bg.addColorStop(0,'#26303f'); bg.addColorStop(1,'#161d28');
  ctx.fillStyle=bg; ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
  // glowing red border
  roundRect(x+0.75,y+0.75,w-1.5,h-1.5,Math.max(1,r-0.5));
  ctx.lineWidth=Math.max(1.5,Math.min(w,h)*0.035); ctx.strokeStyle='rgba(255,80,105,0.95)';
  ctx.shadowColor='rgba(255,45,75,0.75)'; ctx.shadowBlur=Math.max(6,w*0.05); ctx.stroke(); ctx.shadowBlur=0;

  // title bar (top corners rounded only)
  const tb=Math.max(8, Math.min(h*0.34, 20));
  ctx.save(); roundRect(x,y,w,tb+r,r); ctx.clip();
  const tg=ctx.createLinearGradient(0,y,0,y+tb);
  tg.addColorStop(0,'#ff5e70'); tg.addColorStop(1,'#c4172e');
  ctx.fillStyle=tg; ctx.fillRect(x,y,w,tb);
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(x, y+tb, w, Math.max(1,h*0.012));

  // warning glyph
  const cy=y+tb/2, gs=tb*0.60, gx=x+Math.max(5,w*0.07);
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(gx, cy-gs*0.5); ctx.lineTo(gx+gs*0.55, cy+gs*0.5); ctx.lineTo(gx-gs*0.55, cy+gs*0.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#c4172e';
  ctx.fillRect(gx-gs*0.06, cy-gs*0.16, gs*0.12, gs*0.40);
  ctx.fillRect(gx-gs*0.06, cy+gs*0.32, gs*0.12, gs*0.12);

  const wide = w >= 132;
  if(wide){
    const tf=Math.max(8, Math.min(tb*0.58, w*0.085));
    ctx.font=`700 ${tf}px Quicksand, system-ui, sans-serif`;
    ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('SYSTEM ERROR', gx+gs*0.75, cy+0.5);
    // close box (✕) on the right
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.font=`700 ${tf*1.05}px system-ui, sans-serif`;
    ctx.fillText('\u2715', x+w-Math.max(5,w*0.05), cy);
  }

  // body: error code + OK button
  const bodyY=y+tb, bodyH=h-tb;
  if(bodyH>9){
    ctx.save(); roundRect(x,bodyY,w,bodyH,0); ctx.clip();
    ctx.globalAlpha=0.09; ctx.fillStyle='#fff';
    const sy=bodyY + ((t*50 + e.seed*120) % Math.max(2,bodyH));
    ctx.fillRect(x,sy,w,Math.max(1,bodyH*0.05));
    ctx.restore();

    const mf=Math.max(9, Math.min(bodyH*0.40, w/(label.length*0.60)));
    const btnH=Math.min(bodyH*0.32, mf*1.15);
    const showBtn = bodyH > mf*2.0 && w>72;
    ctx.font=`800 ${mf}px "Courier New", monospace`;
    ctx.fillStyle='#ff93a3'; ctx.textAlign='center'; ctx.textBaseline='middle';
    const msgCY = showBtn ? bodyY + (bodyH-btnH)*0.5 : bodyY + bodyH*0.5;
    ctx.fillText(label, x+w/2, msgCY);
    if(showBtn){
      const bw=Math.min(w*0.55, mf*3.2), bh=btnH;
      const bx=x+(w-bw)/2, by=y+h-bh-Math.max(3,h*0.045);
      roundRect(bx,by,bw,bh,bh*0.28);
      const bgr=ctx.createLinearGradient(0,by,0,by+bh);
      bgr.addColorStop(0,'#ff5e70'); bgr.addColorStop(1,'#c4172e');
      ctx.fillStyle=bgr; ctx.fill();
      ctx.fillStyle='#fff'; ctx.font=`700 ${bh*0.52}px Quicksand, system-ui, sans-serif`; ctx.textBaseline='middle';
      ctx.fillText('OK', bx+bw/2, by+bh/2+0.5);
    }
  }
  ctx.restore();
}
function rishiScreenX(){
  const frac=Math.max(0,Math.min(1,(gojoGap-C3.gapCatch)/(C3.gapMax-C3.gapCatch)));
  const backX=W*0.07, nearX=C3.schmooX - C3.flyH*0.5;
  let x=backX+(nearX-backX)*(1-frac) - (rishi3.surge||0)*W*0.05;
  return Math.max(W*0.02, x);
}
function drawRishi3(t){
  const r=rishi3;
  const x=rishiScreenX();
  const h=C3.flyH*1.05, w=h*(568/360), cy=r.y;
  // rocket exhaust trail (rear = left)
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const pulse=0.6+0.4*Math.sin(t*30);
  const tx=x - w*0.40;
  const tg=ctx.createLinearGradient(tx-h*0.9,0,tx+h*0.1,0);
  tg.addColorStop(0,'rgba(120,180,255,0)'); tg.addColorStop(1,`rgba(150,200,255,${(0.45*pulse).toFixed(3)})`);
  ctx.fillStyle=tg; ctx.beginPath();
  ctx.moveTo(tx-h*0.9, cy); ctx.lineTo(tx+h*0.1, cy-h*0.18); ctx.lineTo(tx+h*0.1, cy+h*0.18); ctx.closePath(); ctx.fill();
  ctx.restore();
  // sprite (rocket Rishi faces right toward Schmoo)
  const img=sprites.rishi3Fly;
  ctx.save();
  if(img&&img.complete&&img.naturalWidth){ ctx.drawImage(img, x-w*0.5, cy-h*0.5, w, h); }
  else { ctx.fillStyle='#cdd'; roundRect(x-w*0.4,cy-h*0.3,w*0.8,h*0.6,8); ctx.fill(); }
  ctx.restore();
}
function drawSchmoo3(t){
  const h=C3.flyH*1.30, w=h*(435/360), cx=C3.schmooX, cy=fly.y;
  const pulse=0.6+0.4*Math.sin((fly.thrust||0)*16);
  // soft cyan energy aura beneath the robot
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const R=h*0.50*pulse;
  const fg=ctx.createRadialGradient(cx,cy+h*0.12,0,cx,cy+h*0.12,R*1.5);
  fg.addColorStop(0,'rgba(150,220,255,0.55)'); fg.addColorStop(0.5,'rgba(80,170,255,0.26)'); fg.addColorStop(1,'rgba(60,140,255,0)');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(cx,cy+h*0.12,R*1.5,0,6.283); ctx.fill();
  ctx.restore();
  const blink = invuln3>0 && (Math.floor(invuln3*18)%2===0);
  ctx.save();
  ctx.translate(cx,cy); ctx.rotate((fly.pitch||0)*0.7);
  if(blink) ctx.globalAlpha=0.45;
  const img=sprites.schmoo3Fly;
  if(img&&img.complete&&img.naturalWidth){ ctx.drawImage(img, -w*0.5, -h*0.5, w, h); }
  else { ctx.fillStyle='#9cf'; roundRect(-w*0.4,-h*0.4,w*0.8,h*0.8,12); ctx.fill(); }
  ctx.restore();
}
function drawTaunt3(){
  if(!taunt) return;
  const k=Math.min(1,(taunt.max-taunt.life)/0.16), fade=Math.min(1,taunt.life/0.4), a=Math.min(k,fade);
  if(a<=0) return;
  const rx=rishiScreenX(), ry=rishi3.y, fs=Math.max(13,H*0.026);
  ctx.save(); ctx.font=`700 ${fs}px Quicksand, sans-serif`;
  const maxW=Math.min(W*0.34, fs*15), lines=wrapText(taunt.txt,maxW);
  const padX=fs*0.6,padY=fs*0.45,lh=fs*1.16;
  let tw=0; for(const ln of lines) tw=Math.max(tw,ctx.measureText(ln).width);
  const bw=tw+padX*2, bh=lines.length*lh+padY*2;
  const bx=Math.max(10,Math.min(W-bw-10, rx + C3.flyH*0.2));
  const by=Math.max(8, ry - bh - fs*1.2);
  ctx.globalAlpha=a;
  ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=14; ctx.shadowOffsetY=4;
  roundRect(bx,by,bw,bh,fs*0.6); ctx.fillStyle='#fff'; ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  roundRect(bx,by,bw,bh,fs*0.6); ctx.lineWidth=Math.max(2,fs*0.1);
  ctx.strokeStyle='#ff3344'; ctx.shadowColor='rgba(255,50,70,.6)'; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
  ctx.fillStyle='#1a0a12'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<lines.length;i++) ctx.fillText(lines[i], bx+bw/2, by+padY+lh*(i+0.5));
  ctx.restore();
}
function hud3(){
  const scoreEl=document.getElementById('score'); if(scoreEl) scoreEl.firstChild.nodeValue=String(score);
  const timerEl=document.getElementById('timer'); if(timerEl) timerEl.style.display='none';
  const credEl=document.getElementById('creds');
  if(credEl){ credEl.querySelector('.cnum').textContent=String(bankedCredits); credEl.classList.remove('show-mul'); }
  const frac=Math.max(0,Math.min(1,(gojoGap-C3.gapCatch)/(C3.gapMax-C3.gapCatch)));
  const fill=document.getElementById('fill');
  if(fill){ fill.style.width=(frac*100).toFixed(1)+'%'; fill.style.filter=frac<0.30?'drop-shadow(0 0 8px #ff3d5d)':'none'; }
  const dtx=document.getElementById('dtxt');
  if(dtx){ dtx.textContent = state!=='playing'?'—':(frac<0.30?'CLOSE!':frac<0.6?'gaining':'safe');
           dtx.style.color = frac<0.30?'#ff7088':'var(--mist)'; }
}
function render3(t){
  ctx.save();
  if(shake>0.4){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }
  drawBackground3(t);
  if(fly){
    for(const e of errs) drawError3(e,t);
    drawRishi3(t);
    drawSchmoo3(t);
    drawSparks();
    drawFloaters();
    drawTaunt3();
  }
  ctx.restore();
  if(flash>0.02){ ctx.fillStyle=`rgba(255,40,70,${flash*0.28})`; ctx.fillRect(0,0,W,H); }
  hud3();
}

/* ----------------------------- DEATH / REROLL ----------------------------- */
function caught3(){
  shake=18; flash=0.6; catchSound();
  if(fly){ for(let i=0;i<26;i++){ const a=rng()*6.283, sp=120+rng()*240;
    sparks.push({x:C3.schmooX, y:fly.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.5+rng()*0.5, max:1, col:'#ff7088'}); } }
  if(navigator.vibrate) navigator.vibrate([40,50,90]);
  setTimeout(()=>{ if(state==='gameover') showDeath3(); }, 650);
}
function showDeath3(){
  overlay.className='';
  const canReroll = bankedCredits>=500;
  overlay.innerHTML = `
    <div class="panel">
      <div class="cybercard">
        <div class="statusline cyber" style="color:#ff5d7a"><span class="dot" style="background:#ff3d5d;box-shadow:none"></span> Connection severed</div>
        <h1 class="cyberttl" style="font-size:clamp(34px,8.5vmin,72px)">RISHI<span class="small" style="color:#ff5d7a;-webkit-text-fill-color:#ff5d7a">CAUGHT YOU</span></h1>
        <div class="scoreline">
          <div><span class="n">${score}</span><span class="l">Distance</span></div>
          <div><span class="n gold">${bankedCredits}</span><span class="l">Credits</span></div>
          <div><span class="n">${best}</span><span class="l">Best</span></div>
        </div>
        <div class="deathrow">
          <button class="reroll ${canReroll?'':'disabled'}" id="reroll" ${canReroll?'':'disabled'}>
            <span class="sq">${REROLL_SVG}</span>
            <span class="rlab">REROLL · <b>500</b></span>
          </button>
        </div>
        <button class="cta cyber" id="restart">Start over</button>
        <p class="tiny grn">${canReroll?'Spend 500 credits to drop back in right where you fell.':'Not enough credits to reroll — bank more in the earlier levels.'}</p>
      </div>
    </div>`;
  const rb=document.getElementById('reroll');
  if(rb && canReroll) rb.addEventListener('click', doReroll3);
  document.getElementById('restart').addEventListener('click', showStart);
  submitScore('player', score, null);
}
function doReroll3(){
  if(bankedCredits<500) return;
  bankedCredits-=500;
  overlay.className='hide';
  state='playing';
  invuln3=1.6;
  errs = errs.filter(e=> e.x > C3.schmooX + W*0.35);     // clear the lane right ahead
  gojoGap = Math.max(gojoGap, C3.gapMax*0.72);            // shove Rishi back
  rishi3.surge=0; rishi3.y=fly.y; rishi3.vy=0; rishi3.bob=rng()*6.28;
  flash=0; shake=0;
  startMusic();
}

function ready(){
  resize();
  showWarning();
  requestAnimationFrame(loop);
}
resize();
</script>
